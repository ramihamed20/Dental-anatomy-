<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>Dental Anatomy Study Suite</title>
<meta name="description" content="Dental Anatomy Flashcards &amp; Quiz">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#060B18" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#EEF3FF" media="(prefers-color-scheme: light)">
<style>
/* ═══════════════════════════════════════════════════════
   DENTAL ANATOMY STUDY SUITE — Premium Redesign
   Dark-first • Mobile-first • Accessible
═══════════════════════════════════════════════════════ */

/* === GOOGLE FONTS === */
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap');

/* === RESET === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;scroll-behavior:smooth;}
button{appearance:none;-webkit-appearance:none;font-family:inherit;cursor:pointer;border:none;background:none;}
input,select,textarea{font-family:inherit;font-size:16px;}

/* === DESIGN TOKENS — DARK (default) === */
:root {
  /* Backgrounds */
  --bg:           #060B18;
  --surface:      #0C1828;
  --surface-2:    #111F35;
  --surface-3:    #172A46;
  --glass:        rgba(12,24,40,0.7);

  /* Borders */
  --border:       #1A2E4A;
  --border-bright:#263F60;
  --border-glow:  rgba(0,212,255,0.2);

  /* Accent palette */
  --cyan:         #00D4FF;
  --cyan-dim:     rgba(0,212,255,0.12);
  --cyan-glow:    rgba(0,212,255,0.25);
  --mint:         #00FFC0;
  --mint-dim:     rgba(0,255,192,0.12);
  --violet:       #8B6EFF;
  --violet-dim:   rgba(139,110,255,0.12);
  --amber:        #FFB347;
  --amber-dim:    rgba(255,179,71,0.12);
  --coral:        #FF5A7E;
  --coral-dim:    rgba(255,90,126,0.12);

  /* Text */
  --text:         #E8F2FF;
  --text-2:       #7A9CC4;
  --text-3:       #3A5A80;

  /* Functional */
  --success:      #00FFC0;
  --success-bg:   rgba(0,255,192,0.1);
  --success-border:rgba(0,255,192,0.25);
  --danger:       #FF5A7E;
  --danger-bg:    rgba(255,90,126,0.1);
  --danger-border:rgba(255,90,126,0.25);

  /* App chrome */
  --header-h:     54px;
  --mode-nav-h:   52px;
  --safe-top:     env(safe-area-inset-top, 0px);
  --safe-bottom:  env(safe-area-inset-bottom, 0px);

  /* Card */
  --card-h:       320px;
  --card-radius:  22px;

  /* Typography */
  --font-display: 'Syne', sans-serif;
  --font-body:    'DM Sans', sans-serif;

  /* Radii */
  --r-xs:  6px;
  --r-sm:  10px;
  --r-md:  14px;
  --r-lg:  18px;
  --r-xl:  24px;
  --r-pill:999px;

  /* Shadows */
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.35);
  --shadow-md: 0 4px 24px rgba(0,0,0,0.45);
  --shadow-lg: 0 8px 48px rgba(0,0,0,0.55);
  --shadow-card:0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px var(--border);

  /* Easing */
  --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
  --ease-smooth:cubic-bezier(0.4,0,0.2,1);
  --ease-out:   cubic-bezier(0,0,0.2,1);
}

/* === LIGHT MODE === */
[data-theme="light"] {
  --bg:           #EEF3FF;
  --surface:      #FFFFFF;
  --surface-2:    #F0F5FF;
  --surface-3:    #E4ECFA;
  --glass:        rgba(255,255,255,0.8);

  --border:       #C8D8EE;
  --border-bright:#A0BCE0;
  --border-glow:  rgba(0,102,204,0.2);

  --cyan:         #0066CC;
  --cyan-dim:     rgba(0,102,204,0.1);
  --cyan-glow:    rgba(0,102,204,0.2);
  --mint:         #00997A;
  --mint-dim:     rgba(0,153,122,0.1);
  --violet:       #6B4FE0;
  --violet-dim:   rgba(107,79,224,0.1);
  --amber:        #B86E00;
  --amber-dim:    rgba(184,110,0,0.1);
  --coral:        #D93060;
  --coral-dim:    rgba(217,48,96,0.1);

  --text:         #0A1628;
  --text-2:       #3A5A80;
  --text-3:       #7A9CC4;

  --success:      #00997A;
  --success-bg:   rgba(0,153,122,0.08);
  --success-border:rgba(0,153,122,0.25);
  --danger:       #D93060;
  --danger-bg:    rgba(217,48,96,0.08);
  --danger-border:rgba(217,48,96,0.25);

  --shadow-sm: 0 2px 8px rgba(0,30,80,0.08);
  --shadow-md: 0 4px 24px rgba(0,30,80,0.12);
  --shadow-lg: 0 8px 48px rgba(0,30,80,0.16);
  --shadow-card:0 8px 32px rgba(0,30,80,0.12), 0 0 0 1px var(--border);
}

/* === BASE LAYOUT === */
html, body {
  height: 100%;
  overflow-x: hidden;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.5;
  padding-top: calc(var(--header-h) + var(--mode-nav-h));
  overscroll-behavior-y: none;
  transition: background 0.3s var(--ease-smooth), color 0.3s var(--ease-smooth);
}

/* === AMBIENT ORBS === */
.ambient {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
  overflow: hidden;
}
.orb {
  position: absolute; border-radius: 50%;
  filter: blur(90px); opacity: 0.14;
  transition: opacity 0.5s;
}
[data-theme="light"] .orb { opacity: 0.07; }
.orb-1 {
  width: 700px; height: 700px;
  background: var(--cyan);
  top: -280px; left: -200px;
  animation: orb-drift-1 22s ease-in-out infinite;
}
.orb-2 {
  width: 600px; height: 600px;
  background: var(--violet);
  bottom: -200px; right: -180px;
  animation: orb-drift-2 28s ease-in-out infinite;
}
.orb-3 {
  width: 450px; height: 450px;
  background: var(--mint);
  top: 40%; left: 50%;
  transform: translate(-50%,-50%);
  animation: orb-drift-3 35s ease-in-out infinite;
}
@keyframes orb-drift-1 {
  0%,100% { transform: translate(0,0) scale(1); }
  33% { transform: translate(50px,60px) scale(1.05); }
  66% { transform: translate(-30px,30px) scale(0.95); }
}
@keyframes orb-drift-2 {
  0%,100% { transform: translate(0,0); }
  50% { transform: translate(-60px,-40px) scale(1.08); }
}
@keyframes orb-drift-3 {
  0%,100% { transform: translate(-50%,-50%); }
  50% { transform: translate(-48%,-52%) scale(1.1); }
}

/* === APP HEADER === */
.app-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  padding: 0 16px;
  padding-top: var(--safe-top);
  z-index: 200;
  display: flex; align-items: center; justify-content: space-between;
  background: var(--glass);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  transition: background 0.3s, border-color 0.3s;
}
.header-brand {
  display: flex; align-items: center; gap: 10px;
}
.brand-icon {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--cyan), var(--violet));
  border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  box-shadow: 0 0 16px var(--cyan-glow);
  flex-shrink: 0;
}
.brand-name {
  font-family: var(--font-display);
  font-size: 17px; font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--text) 30%, var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.15;
}
.brand-sub {
  font-size: 10px; color: var(--text-3);
  letter-spacing: 0.2px;
  line-height: 1;
}

/* Theme toggle */
.theme-toggle {
  width: 38px; height: 38px;
  border-radius: var(--r-pill);
  background: var(--surface-2);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: all 0.25s var(--ease-spring);
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}
.theme-toggle:hover {
  background: var(--surface-3);
  border-color: var(--border-bright);
  transform: scale(1.05);
}
.theme-toggle:active { transform: scale(0.93) rotate(20deg); }
.theme-toggle .t-sun { display: none; }
.theme-toggle .t-moon { display: inline; }
[data-theme="light"] .theme-toggle .t-sun { display: inline; }
[data-theme="light"] .theme-toggle .t-moon { display: none; }

/* === MODE SWITCHER === */
.mode-switcher {
  position: fixed;
  top: var(--header-h); left: 0; right: 0;
  height: var(--mode-nav-h);
  z-index: 199;
  display: flex; align-items: center; justify-content: center;
  padding: 0 16px;
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border-bottom: 1px solid var(--border);
  transition: background 0.3s;
}
.mode-track {
  display: flex; gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-pill);
  padding: 4px;
  width: 100%; max-width: 320px;
  position: relative;
}
.mode-btn {
  flex: 1; padding: 8px 14px;
  border-radius: var(--r-pill);
  font-family: var(--font-display);
  font-size: 13px; font-weight: 700;
  letter-spacing: 0.3px;
  color: var(--text-3);
  transition: color 0.2s var(--ease-smooth);
  position: relative; z-index: 1;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  white-space: nowrap;
}
.mode-btn:active { opacity: 0.8; }
.mode-btn.active { color: #fff; }
.mode-glider {
  position: absolute;
  top: 4px; bottom: 4px;
  width: calc(50% - 4px);
  left: 4px;
  background: linear-gradient(135deg, var(--cyan), var(--violet));
  border-radius: var(--r-pill);
  transition: transform 0.35s var(--ease-spring);
  box-shadow: 0 2px 12px var(--cyan-glow);
}
.mode-glider.right { transform: translateX(calc(100% + 0px)); }

/* === MODE SECTIONS === */
.mode-section {
  display: none; min-height: 100vh;
  position: relative; z-index: 1;
}
.mode-section.active { display: block; }

/* ── Fade-in animation when switching ── */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.mode-section.active { animation: fadeSlideUp 0.3s var(--ease-out) both; }

/* ═══════════════════════════════════════
   FLASHCARD SECTION
═══════════════════════════════════════ */

/* === LECTURE TABS === */
.lec-scroll-wrap {
  padding: 14px 0 10px;
  overflow: hidden;
}
.lec-tabs {
  display: flex; gap: 7px;
  padding: 0 14px;
  overflow-x: auto; overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  scroll-snap-type: x proximity;
  scroll-padding: 14px;
}
.lec-tabs::-webkit-scrollbar { display: none; }
.lec-btn {
  flex-shrink: 0; padding: 8px 14px;
  border-radius: var(--r-pill);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-3);
  font-family: var(--font-display);
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.3px;
  transition: all 0.2s var(--ease-smooth);
  -webkit-tap-highlight-color: transparent;
  scroll-snap-align: start;
  white-space: nowrap;
  user-select: none;
}
.lec-btn:hover { color: var(--text-2); border-color: var(--border-bright); }
.lec-btn:active { transform: scale(0.95); }
.lec-count {
  font-size: 10px; font-weight: 400;
  opacity: 0.65; margin-left: 3px;
}
/* Active states per lecture */
.lec-btn[data-lec="all"].active   { background: linear-gradient(135deg,var(--cyan),var(--violet)); box-shadow: 0 2px 12px var(--cyan-glow); }
.lec-btn[data-lec="intro"].active { background: linear-gradient(135deg,#06b6d4,#8b5cf6); box-shadow: 0 2px 12px rgba(6,182,212,0.3); }
.lec-btn[data-lec="inc-can"].active  { background: linear-gradient(135deg,#f59e0b,#ef4444); box-shadow: 0 2px 12px rgba(245,158,11,0.3); color:#fff; }
.lec-btn[data-lec="pre-mol"].active  { background: linear-gradient(135deg,#10b981,#3b82f6); box-shadow: 0 2px 12px rgba(16,185,129,0.3); color:#fff; }
.lec-btn[data-lec="occlusion"].active { background: linear-gradient(135deg,#f97316,#ec4899); box-shadow: 0 2px 12px rgba(249,115,22,0.3); color:#fff; }

/* === STATS BAR === */
.stats-bar {
  display: flex; align-items: center; justify-content: center;
  gap: 0; padding: 6px 14px 8px;
  position: relative; z-index: 2;
}
.stat {
  display: flex; align-items: center; gap: 4px;
  padding: 4px 12px;
  font-size: 13px; color: var(--text-2);
}
.stat-val {
  font-family: var(--font-display);
  font-weight: 700; font-size: 15px; color: var(--text);
}
.stat-sep { color: var(--text-3); font-size: 12px; margin: 0 1px; }
.stat-lbl { font-size: 11px; color: var(--text-3); margin-left: 2px; }
.stat-icon { font-size: 13px; }
.stat-icon.stat-know { color: var(--mint); }
.stat-icon.stat-skip { color: var(--amber); }
.stat-divider {
  width: 1px; height: 20px;
  background: var(--border);
}

/* === CATEGORY FILTER === */
.cat-wrap { padding: 2px 14px 8px; }
.cat-toggle {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px;
  border-radius: var(--r-md);
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-2);
  font-size: 12px; font-weight: 600;
  font-family: var(--font-body);
  -webkit-tap-highlight-color: transparent;
  transition: all 0.2s; width: 100%;
  margin-bottom: 8px;
}
.cat-toggle:hover { border-color: var(--border-bright); color: var(--text); }
.cat-arrow {
  margin-left: auto; transition: transform 0.25s var(--ease-smooth);
  color: var(--text-3);
}
.cat-arrow.open { transform: rotate(180deg); }
.cat-chips {
  display: flex; flex-wrap: wrap; gap: 6px;
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.35s var(--ease-out), opacity 0.3s;
  opacity: 0;
}
.cat-chips.expanded { max-height: 500px; opacity: 1; }
.cat-btn {
  padding: 5px 11px;
  border-radius: var(--r-pill);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-3);
  font-size: 11px; font-weight: 500;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all 0.18s var(--ease-smooth);
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.cat-btn:hover { color: var(--text-2); border-color: var(--border-bright); }
.cat-btn:active { transform: scale(0.94); }
.cat-btn.active { color: #fff; }
/* Per-category active colors */
.cat-btn[data-cat="all"].active           { background: var(--cyan); border-color: var(--cyan); box-shadow: 0 0 10px var(--cyan-glow); }

/* === PROGRESS === */
.progress-zone {
  padding: 0 14px 10px;
}
.progress-rail {
  height: 4px;
  background: var(--surface-2);
  border-radius: var(--r-pill);
  overflow: hidden;
  position: relative;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--mint), var(--violet));
  background-size: 200% 100%;
  border-radius: var(--r-pill);
  transition: width 0.5s var(--ease-out);
  animation: progress-shimmer 3s linear infinite;
  box-shadow: 0 0 8px var(--cyan-glow);
}
@keyframes progress-shimmer {
  0%   { background-position: 100% 0; }
  100% { background-position: -100% 0; }
}
.progress-info {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--text-3);
  margin-top: 5px; padding: 0 2px;
}

/* === CARD STAGE === */
.card-stage {
  padding: 0 14px 8px;
  display: flex; flex-direction: column; align-items: center;
  position: relative; z-index: 2;
}
.card-num-label {
  font-family: var(--font-display);
  font-size: 11px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 10px;
  align-self: flex-start;
}

/* === FLIP CARD === */
.flip-container {
  width: 100%; max-width: 600px;
  height: var(--card-h);
  perspective: 1400px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  user-select: none;
}
.flip-inner {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s cubic-bezier(0.23,1,0.32,1);
}
.flip-container.flipped .flip-inner { transform: rotateY(180deg); }
.card-face {
  position: absolute; inset: 0;
  border-radius: var(--card-radius);
  padding: 22px 22px 18px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  display: flex; flex-direction: column;
  overflow: hidden;
}
/* Front face */
.face-front {
  background: linear-gradient(155deg, var(--surface) 0%, var(--surface-2) 100%);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-card);
}
.face-front::before {
  content: '';
  position: absolute; top: 0; left: 20px; right: 20px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
}
/* Back face */
.face-back {
  background: linear-gradient(155deg, #0D1E38 0%, #141530 100%);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-card);
  transform: rotateY(180deg);
  overflow-y: auto;
}
[data-theme="light"] .face-front {
  background: linear-gradient(155deg, #FFFFFF, #F0F5FF);
}
[data-theme="light"] .face-back {
  background: linear-gradient(155deg, #F5F0FF, #EBF2FF);
}

/* Category tag (face-tag) */
.face-tag {
  display: inline-flex; align-items: center;
  padding: 4px 10px;
  border-radius: var(--r-pill);
  font-family: var(--font-display);
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.8px; text-transform: uppercase;
  margin-bottom: 14px; align-self: flex-start;
  flex-shrink: 0;
}

  display: flex; gap: 10px;

  margin-top: 14px;
}
.action-btn {
  flex: 1; padding: 13px 10px;
  border-radius: var(--r-md);
  border: 1px solid transparent;
  font-family: var(--font-display);
  font-size: 13px; font-weight: 700;
  letter-spacing: 0.3px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all 0.2s var(--ease-spring);
  -webkit-tap-highlight-color: transparent;
  min-height: 48px;
}
.action-btn:active { transform: scale(0.96); }
.action-btn.know {
  background: var(--success-bg);
  border-color: var(--success-border);
  color: var(--mint);
}
.action-btn.know:hover {
  background: rgba(0,255,192,0.18);
  box-shadow: 0 0 16px rgba(0,255,192,0.2);
}
.action-btn.review {
  background: var(--amber-dim);
  border-color: rgba(255,179,71,0.25);
  color: var(--amber);
}
.action-btn.review:hover {
  background: rgba(255,179,71,0.2);
  box-shadow: 0 0 16px rgba(255,179,71,0.2);
}

  display: flex; align-items: center; gap: 10px;

.nav-btn {
  width: 52px; height: 52px;
  border-radius: var(--r-md);
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 20px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s var(--ease-spring);
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}
.nav-btn:hover { background: var(--surface-2); border-color: var(--border-bright); }
.nav-btn:active { transform: scale(0.9); }
.util-btns {
  flex: 1; display: flex; gap: 8px; justify-content: center;
}
.util-btn {
  flex: 1; height: 44px;
  border-radius: var(--r-sm);
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-2);
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s var(--ease-spring);
  -webkit-tap-highlight-color: transparent;
}
.util-btn:hover { background: var(--surface-2); color: var(--text); }
.util-btn:active { transform: scale(0.93); }

/* === MINI GRID OVERVIEW === */
.grid-section {
  padding: 18px 14px 80px;
  position: relative; z-index: 2;
}
.grid-header {
  display: flex; align-items: baseline; gap: 8px;
  margin-bottom: 12px;
}
.grid-title {
  font-family: var(--font-display);
  font-size: 13px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--text-2);
}
.grid-hint { font-size: 11px; color: var(--text-3); }
.mini-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 7px;
}
.mini-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 8px 10px; cursor: pointer;
  transition: all 0.18s var(--ease-smooth);
  display: flex; flex-direction: column; gap: 3px;
  -webkit-tap-highlight-color: transparent;
}
.mini-card:hover { border-color: var(--border-bright); background: var(--surface-2); }
.mini-card:active { transform: scale(0.97); }
.mini-card.active {
  border-color: var(--cyan);
  background: var(--cyan-dim);
  box-shadow: 0 0 10px var(--cyan-glow);
}
.mini-card.done { opacity: 0.38; }
.mini-num {
  font-family: var(--font-display);
  font-size: 10px; font-weight: 800;
  color: var(--cyan);
}
.mini-card span:last-child {
  font-size: 11px; color: var(--text-3); line-height: 1.4;
}

/* ═══════════════════════════════════════
   QUIZ SECTION
═══════════════════════════════════════ */
#qz-section .main {
  height: calc(100dvh - var(--header-h) - var(--mode-nav-h));
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  position: relative; z-index: 1;
}
#qz-section .main::-webkit-scrollbar { width: 3px; }
#qz-section .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.section { display: none; padding: 14px 14px 80px; }
.section.active { display: flex; flex-direction: column; animation: fadeSlideUp 0.25s var(--ease-out) both; }

/* Filter row */
.filter-row {
  display: flex; gap: 7px;
  overflow-x: auto; overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding: 2px 0 10px;
  scroll-snap-type: x proximity;
  flex-shrink: 0;
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-btn {
  flex-shrink: 0; padding: 8px 14px;
  border-radius: var(--r-pill);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-2);
  font-family: var(--font-display);
  font-size: 12px; font-weight: 700;
  min-height: 38px; letter-spacing: 0.2px;
  transition: all 0.18s var(--ease-smooth);
  -webkit-tap-highlight-color: transparent;
  scroll-snap-align: start; user-select: none;
}
.filter-btn:hover { color: var(--text); border-color: var(--border-bright); }
.filter-btn:active { transform: scale(0.95); }
/* ── Category Picker ── */
#quizCategoryPicker {
  padding: 8px 0 16px;
  animation: fadeSlideUp 0.25s var(--ease-out) both;
}
.cat-picker-header { text-align: center; margin-bottom: 20px; }
.cat-picker-title {
  font-family: var(--font-display); font-size: 22px; font-weight: 800;
  background: linear-gradient(135deg, var(--text), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 5px;
}
.cat-picker-sub { color: var(--text-3); font-size: 13px; }
.cat-cards {
  display: flex; flex-direction: column; gap: 12px;
  max-width: 400px; margin: 0 auto;
}
.cat-card {
  display: grid;
  grid-template-columns: 44px 1fr 20px;
  grid-template-rows: auto auto;
  gap: 2px 10px;
  align-items: center;
  padding: 16px 18px;
  border-radius: var(--r-lg);
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text);
  text-align: left; cursor: pointer;
  transition: all 0.22s var(--ease-spring);
  -webkit-tap-highlight-color: transparent;
  position: relative; overflow: hidden;
}
.cat-card::before {
  content: ''; position: absolute; inset: 0;
  opacity: 0; transition: opacity 0.2s;
}
.cat-card:active { transform: scale(0.97); }
.cat-ai { border-color: color-mix(in srgb, var(--cyan) 35%, var(--border)); }
.cat-ai::before { background: linear-gradient(135deg, var(--cyan-glow), transparent); }
.cat-ai:hover, .cat-ai:focus { border-color: var(--cyan); box-shadow: 0 4px 20px var(--cyan-glow); }
.cat-ai:hover::before { opacity: 1; }
.cat-pe1 { border-color: color-mix(in srgb, var(--violet) 35%, var(--border)); }
.cat-pe1::before { background: linear-gradient(135deg, rgba(139,92,246,0.12), transparent); }
.cat-pe1:hover, .cat-pe1:focus { border-color: var(--violet); box-shadow: 0 4px 20px rgba(139,92,246,0.25); }
.cat-pe1:hover::before { opacity: 1; }
.cat-pe2 { border-color: color-mix(in srgb, var(--mint) 35%, var(--border)); }
.cat-pe2::before { background: linear-gradient(135deg, rgba(0,255,192,0.12), transparent); }
.cat-pe2:hover, .cat-pe2:focus { border-color: var(--mint); box-shadow: 0 4px 20px rgba(0,255,192,0.25); }
.cat-pe2:hover::before { opacity: 1; }
.cat-card-icon {
  grid-row: 1 / 3; font-size: 28px;
  display: flex; align-items: center; justify-content: center;
}
.cat-card-name {
  font-family: var(--font-display); font-size: 16px; font-weight: 800;
  color: var(--text); grid-column: 2;
}
.cat-card-desc {
  font-size: 11px; color: var(--text-3);
  grid-column: 2; line-height: 1.4;
}
.cat-card-arrow {
  grid-row: 1/3; font-size: 22px; color: var(--text-3);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s;
}
.cat-card:hover .cat-card-arrow { transform: translateX(3px); color: var(--text); }

/* ── Filter Area Header ── */
#quizFilterArea { animation: fadeSlideUp 0.22s var(--ease-out) both; }
.filter-area-header {
  display: flex; align-items: center; gap: 10px;
  padding: 0 0 12px;
}
.filter-back-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 7px 12px; border-radius: var(--r-pill);
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text-2); font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all 0.18s;
  -webkit-tap-highlight-color: transparent;
}
.filter-back-btn:hover { color: var(--text); border-color: var(--border-bright); }
.filter-back-btn:active { transform: scale(0.95); }
.filter-area-title {
  font-family: var(--font-display); font-size: 15px; font-weight: 800;
  color: var(--text);
}

.filter-group-label {
  flex-shrink: 0; align-self: center;
  font-size: 10px; font-weight: 800; letter-spacing: 0.8px;
  text-transform: uppercase; color: var(--violet);
  padding: 0 4px; opacity: 0.85;
  scroll-snap-align: start;
}
.filter-btn.pe1-btn {
  border-color: color-mix(in srgb, var(--violet) 40%, var(--border));
}
.filter-btn.pe1-btn:hover { border-color: var(--violet); color: var(--violet); }
.filter-btn.pe1-btn.active {
  background: linear-gradient(135deg, var(--violet), #7c3aed);
  border-color: transparent;
  box-shadow: 0 2px 12px rgba(139,92,246,0.35);
}
.filter-btn.active {
  background: linear-gradient(135deg, var(--cyan), var(--violet));
  border-color: transparent; color: #fff;
  box-shadow: 0 2px 12px var(--cyan-glow);
}

/* Quiz start screen */
.quiz-start { text-align: center; padding: 12px 0; }
.quiz-start h2 {
  font-family: var(--font-display);
  font-size: 24px; font-weight: 800;
  margin-bottom: 6px;
  background: linear-gradient(135deg, var(--text), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.quiz-start p {
  color: var(--text-3); font-size: 13px; margin-bottom: 22px;
}
.start-options {
  display: flex; flex-direction: column; gap: 9px;
  max-width: 360px; margin: 0 auto 16px;
}
.start-opt-btn {
  padding: 16px 18px; border-radius: var(--r-lg);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text); text-align: left; cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.2s var(--ease-spring);
  min-height: 60px; position: relative; overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}
.start-opt-btn::before {
  content: ''; position: absolute;
  left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--cyan); opacity: 0;
  transition: opacity 0.2s; border-radius: 3px 0 0 3px;
}
.start-opt-btn:hover { border-color: var(--cyan); background: var(--surface-2); }
.start-opt-btn:hover::before { opacity: 1; }
.start-opt-btn:active { transform: scale(0.98); }
.start-opt-all {
  border-color: var(--cyan) !important;
  background: linear-gradient(135deg, var(--cyan-dim), transparent) !important;
}
.start-opt-all::before { opacity: 1 !important; }
.sot { font-size: 14px; font-weight: 700; display: block; margin-bottom: 3px; }
.son { font-size: 11px; color: var(--text-3); }

/* Quiz header */
.quiz-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px; flex-shrink: 0;
}
.quiz-back-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 7px 12px;
  border-radius: var(--r-pill);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-2);
  font-size: 12px; font-weight: 600;
  font-family: var(--font-body);
  transition: all 0.18s; flex-shrink: 0; min-height: 36px;
  -webkit-tap-highlight-color: transparent; cursor: pointer;
}
.quiz-back-btn:hover { color: var(--text); border-color: var(--border-bright); }
.quiz-back-btn:active { transform: scale(0.95); }
.quiz-q-num {
  font-size: 12px; color: var(--text-3); font-weight: 600;
  flex: 1; text-align: center;
}
.quiz-score-chip {
  font-size: 12px; font-weight: 700; color: var(--mint);
  background: var(--mint-dim);
  border: 1px solid rgba(0,255,192,0.2);
  padding: 4px 12px; border-radius: var(--r-pill); flex-shrink: 0;
}

/* Quiz progress bar */
.quiz-progress-bar {
  height: 3px; background: var(--surface-2);
  border-radius: var(--r-pill); margin-bottom: 14px;
  overflow: hidden; flex-shrink: 0;
}
.quiz-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--mint));
  border-radius: var(--r-pill);
  transition: width 0.4s var(--ease-out);
  box-shadow: 0 0 8px var(--cyan-glow);
}

/* Type badge */
.quiz-type-badge {
  font-size: 9px; padding: 4px 10px;
  border-radius: var(--r-pill); font-weight: 700;
  letter-spacing: 0.8px; text-transform: uppercase;
  display: inline-block;
}
.quiz-type-badge.tf {
  background: var(--amber-dim); color: var(--amber);
  border: 1px solid rgba(255,179,71,0.25);
}
.quiz-type-badge.mcq {
  background: var(--cyan-dim); color: var(--cyan);
  border: 1px solid rgba(0,212,255,0.25);
}

/* Quiz card */
.quiz-card {
  background: linear-gradient(160deg, var(--surface), var(--surface-2));
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 18px 16px; margin-bottom: 12px;
  box-shadow: var(--shadow-md);
  flex-shrink: 0;
}
.quiz-question {
  font-size: clamp(14px,3.8vw,16px);
  line-height: 1.65; color: var(--text);
  margin-bottom: 16px; margin-top: 10px;
}
.quiz-options { display: flex; flex-direction: column; gap: 8px; }
.quiz-opt {
  padding: 13px 14px; border-radius: var(--r-sm);
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text); font-size: 15px;
  cursor: pointer; text-align: left;
  transition: all 0.18s var(--ease-smooth);
  font-family: var(--font-body); line-height: 1.45;
  display: flex; align-items: flex-start; gap: 10px;
  min-height: 52px;
  -webkit-tap-highlight-color: transparent;
}
.quiz-opt:hover { border-color: var(--cyan); background: var(--surface-3); }
.quiz-opt:active { transform: scale(0.99); opacity: 0.85; }
.quiz-opt.correct {
  background: var(--success-bg); border-color: var(--mint);
  color: var(--mint); box-shadow: 0 0 14px rgba(0,255,192,0.12);
}
.quiz-opt.wrong {
  background: var(--danger-bg); border-color: var(--coral);
  color: var(--coral);
}
.quiz-opt.show-correct {
  background: rgba(0,255,192,0.05); border-color: var(--mint);
  color: var(--mint);
}
.quiz-opt[disabled] { cursor: default; }
.opt-label {
  font-weight: 700; font-size: 12px; flex-shrink: 0;
  margin-top: 2px; opacity: 0.5;
}
.quiz-opt.correct .opt-label,
.quiz-opt.wrong .opt-label,
.quiz-opt.show-correct .opt-label { opacity: 1; }
.quiz-opt span:last-child { word-break: break-word; }

/* TF Buttons */
.tf-buttons { display: flex; gap: 10px; }
.tf-btn {
  flex: 1; padding: 16px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  background: var(--surface-2); color: var(--text);
  font-size: 16px; font-weight: 700;
  cursor: pointer; font-family: var(--font-body);
  transition: all 0.18s var(--ease-spring);
  min-height: 56px;
  -webkit-tap-highlight-color: transparent;
}
.tf-btn:active { transform: scale(0.97); }
.tf-btn.true-btn:hover { background: var(--success-bg); border-color: var(--mint); color: var(--mint); }
.tf-btn.false-btn:hover { background: var(--danger-bg); border-color: var(--coral); color: var(--coral); }
.tf-btn.correct { background: var(--success-bg); border-color: var(--mint); color: var(--mint); box-shadow: 0 0 14px rgba(0,255,192,0.1); }
.tf-btn.wrong { background: var(--danger-bg); border-color: var(--coral); color: var(--coral); }
.tf-btn[disabled] { cursor: default; }

/* Explanation */
.quiz-explanation {
  margin-top: 12px; padding: 12px 14px;
  background: var(--cyan-dim);
  border: 1px solid rgba(0,212,255,0.15);
  border-radius: var(--r-sm);
  font-size: 13px; color: var(--text-2);
  line-height: 1.65; display: none;
}
.quiz-explanation.visible {
  display: block; animation: fadeSlideUp 0.28s var(--ease-out) both;
}
.quiz-explanation strong { color: var(--cyan); }

/* Next button */
.quiz-next-btn {
  width: 100%; padding: 15px;
  border-radius: var(--r-sm);
  border: none;
  background: linear-gradient(135deg, var(--cyan), var(--violet));
  color: #fff; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: var(--font-display);
  min-height: 52px; letter-spacing: 0.3px;
  box-shadow: 0 4px 20px var(--cyan-glow);
  transition: opacity 0.18s, transform 0.15s;
  display: none; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.quiz-next-btn.visible {
  display: block; animation: pulse-in 0.3s var(--ease-spring) both;
}
.quiz-next-btn:active { transform: scale(0.98); opacity: 0.9; }
@keyframes pulse-in {
  from { opacity: 0; transform: scale(0.95) translateY(6px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

/* Result screen */
.quiz-result { display: none; text-align: center; padding: 28px 16px; }
.quiz-result.visible { display: block; animation: fadeSlideUp 0.4s var(--ease-spring) both; }
.result-score {
  font-family: var(--font-display);
  font-size: 72px; font-weight: 800; line-height: 1;
  background: linear-gradient(135deg, var(--cyan), var(--mint));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  margin: 16px 0 8px;
  filter: drop-shadow(0 0 24px rgba(0,212,255,0.25));
}
.result-label { font-size: 14px; color: var(--text-3); margin-bottom: 24px; }
.result-stats {
  display: flex; gap: 10px; justify-content: center; margin-bottom: 28px;
}
.stat-chip {
  padding: 9px 18px; border-radius: var(--r-sm);
  font-size: 14px; font-weight: 700; border: 1px solid transparent;
}
.stat-chip.green {
  background: var(--success-bg); color: var(--mint);
  border-color: var(--success-border);
}
.stat-chip.red {
  background: var(--danger-bg); color: var(--coral);
  border-color: var(--danger-border);
}
.restart-btn {
  padding: 14px 36px; border-radius: var(--r-md); border: none;
  background: linear-gradient(135deg, var(--cyan), var(--violet));
  color: #fff; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: var(--font-display);
  box-shadow: 0 4px 20px var(--cyan-glow);
  transition: opacity 0.18s, transform 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.restart-btn:active { transform: scale(0.97); opacity: 0.9; }

/* Confirm modal */
.confirm-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(6,11,24,0.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center;
  padding: 20px;
  pointer-events: none;
}
.confirm-overlay.open {
  display: flex;
  pointer-events: auto;
}
.confirm-box {
  background: var(--surface-2);
  border: 1px solid var(--border-bright);
  border-radius: var(--r-xl);
  padding: 28px 24px;
  max-width: 340px; width: 100%;
  text-align: center;
  box-shadow: var(--shadow-lg);
  animation: pop-in 0.3s var(--ease-spring) both;
}
@keyframes pop-in {
  from { opacity: 0; transform: scale(0.85) translateY(16px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.confirm-icon { font-size: 36px; margin-bottom: 12px; }
.confirm-title {
  font-family: var(--font-display); font-size: 18px; font-weight: 800;
  color: var(--text); margin-bottom: 8px;
}
.confirm-msg { font-size: 14px; color: var(--text-2); line-height: 1.6; margin-bottom: 22px; }
.confirm-msg strong { color: var(--text); }
.confirm-btns { display: flex; gap: 10px; }
.confirm-no {
  flex: 1; padding: 12px;
  border-radius: var(--r-md);
  border: 1px solid var(--border-bright);
  background: var(--surface-3); color: var(--text);
  font-size: 14px; font-weight: 700;
  font-family: var(--font-display);
  cursor: pointer; transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.confirm-no:active { transform: scale(0.97); }
.confirm-yes {
  flex: 1; padding: 12px;
  border-radius: var(--r-md); border: none;
  background: var(--danger-bg);
  border: 1px solid var(--danger-border);
  color: var(--coral);
  font-size: 14px; font-weight: 700;
  font-family: var(--font-display);
  cursor: pointer; transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.confirm-yes:active { transform: scale(0.97); }

/* Shimmer loading animation (used on page load) */
@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position:  200% 0; }
}

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* === RESPONSIVE === */
@media (min-width: 480px) {
  :root { --card-h: 360px; }
  .brand-name { font-size: 18px; }
  .card-stage { padding: 0 20px 12px; }
  .lec-tabs { padding: 0 20px; }
  .stats-bar { padding: 8px 20px; }
  .cat-wrap { padding: 2px 20px 10px; }
  .progress-zone { padding: 0 20px 12px; }
  .grid-section { padding: 20px 20px 80px; }
  .section { padding: 14px 20px 80px; }
}
@media (min-width: 640px) {
  :root { --card-h: 380px; }
  .mini-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  .flip-container { max-width: 560px; }
  .card-actions, .card-nav-row { max-width: 560px; }
}
@media (min-width: 768px) {
  :root { --card-h: 400px; --header-h: 58px; }
  .app-header { padding: 0 24px; }
  .mode-switcher { padding: 0 24px; }
  .mode-track { max-width: 360px; }
