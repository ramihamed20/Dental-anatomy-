{ cat:"upper6",       lec:"pre-mol", q:'What is the root trunk length on the distal surface of upper 6?', a:'5 mm from cervical line.' },
{ cat:"upper6",       lec:"pre-mol", q:'Which roots are visible from the distal view of upper 6?', a:'DB root and palatal root only.' },
{ cat:"upper6",       lec:"pre-mol", q:'What is the geometric shape of the occlusal surface of upper 6?', a:'Rhomboid.' },
{ cat:"upper6",       lec:"pre-mol", q:'List the 4 main cusps of upper 6 from largest to smallest.', a:'ML (largest) > MB > DB > DL (smallest) + Tubercle of Carabelli.' },
{ cat:"upper6",       lec:"pre-mol", q:'What is the unique ridge found only in upper molars?', a:'Oblique ridge (from ML cusp to DB cusp).' },
{ cat:"upper6",       lec:"pre-mol", q:'Where is the central fossa of upper 6 located in relation to the oblique ridge?', a:'Mesial to oblique ridge.' },
{ cat:"upper6",       lec:"pre-mol", q:'Where is the distal fossa of upper 6 located?', a:'Distal to oblique ridge.' },
{ cat:"upper6",       lec:"pre-mol", q:'What is the transverse groove of upper 6?', a:'Crosses the oblique ridge from central fossa to distal fossa.' },
{ cat:"upper6",       lec:"pre-mol", q:'How many grooves does the occlusal surface of upper 6 have?', a:'5: central, distal, transverse, buccal developmental, lingual developmental.' },
{ cat:"upper7",       lec:"pre-mol", q:'How does upper 7 compare in size to upper 6?', a:'Smaller than upper 6.' },
{ cat:"upper7",       lec:"pre-mol", q:'Does upper 7 have a Tubercle of Carabelli?', a:'No Tubercle of Carabelli.' },
{ cat:"upper7",       lec:"pre-mol", q:'When does upper 7 erupt?', a:'12–13 years.' },
{ cat:"upper7",       lec:"pre-mol", q:'When is upper 7 root completed?', a:'15–16 years.' },
{ cat:"upper7",       lec:"pre-mol", q:'How do the roots of upper 7 compare to upper 6?', a:'More parallel, more inclined distally, less divergent, same length.' },
{ cat:"upper7",       lec:"pre-mol", q:'By how much is upper 7 crown narrower than upper 6?', a:'1 mm narrower.' },
{ cat:"upper7",       lec:"pre-mol", q:'By how much is upper 7 crown shorter than upper 6?', a:'0.5 mm shorter.' },
{ cat:"upper7",       lec:"pre-mol", q:'Where is the buccal groove of upper 7 located compared to upper 6?', a:'More distally located in upper 7; no horizontal groove.' },
{ cat:"upper7",       lec:"pre-mol", q:'The apex of the MB root of upper 7 is on line with what?', a:'Buccal groove of the crown.' },
{ cat:"upper7",       lec:"pre-mol", q:'Which is the largest cusp of upper 7?', a:'Mesiolingual (ML) cusp.' },
{ cat:"upper7",       lec:"pre-mol", q:'What happens to the distolingual cusp of upper 7?', a:'Smaller than DL of upper 6; sometimes absent.' },
{ cat:"upper7",       lec:"pre-mol", q:'What are the 2 possible crown forms of upper 7 occlusal surface?', a:'1. Rhomboidal (most frequent); 2. Heart shape (less frequent).' },
{ cat:"upper7",       lec:"pre-mol", q:'When does upper 7 take a heart shape?', a:'When the DL cusp is less developed or absent.' },
{ cat:"upper8",       lec:"pre-mol", q:'What is the size of upper 8 compared to other upper molars?', a:'Smallest upper molar.' },
{ cat:"upper8",       lec:"pre-mol", q:'When does upper 8 erupt?', a:'18–21 years.' },
{ cat:"upper8",       lec:"pre-mol", q:'What is the most common occlusal shape of upper 8?', a:'Heart shape (3 cusps when DL absent).' },
{ cat:"upper8",       lec:"pre-mol", q:'What feature is usually absent in upper 8?', a:'Distolingual (DL) cusp (less developed or absent).' },
{ cat:"upper8",       lec:"pre-mol", q:'Describe the roots of upper 8.', a:'3 roots, smaller and usually fused.' },
{ cat:"upper8",       lec:"pre-mol", q:'What is present on the occlusal surface of upper 8?', a:'Many supplemental grooves.' },
{ cat:"pre-mol-comp", lec:"pre-mol", q:'Compare the buccal cusp slope rule: upper 4 vs lower 4.', a:'Upper 4: mesial slope LONGER; Lower 4: mesial slope SHORTER.' },
{ cat:"pre-mol-comp", lec:"pre-mol", q:'Compare occlusal shape: upper 4 vs upper 5.', a:'Upper 4: hexagonal; Upper 5: oval.' },
{ cat:"pre-mol-comp", lec:"pre-mol", q:'Compare occlusal shape: lower 4 vs lower 5.', a:'Lower 4: diamond; Lower 5: round (2-cusp) or square (3-cusp).' },
{ cat:"pre-mol-comp", lec:"pre-mol", q:'Compare root numbers: upper 4 vs upper 5.', a:'Upper 4: 2 roots (80%); Upper 5: 1 root (85%).' },
{ cat:"pre-mol-comp", lec:"pre-mol", q:'What do upper 6 and lower 6 have in common?', a:'Both called "key of occlusion", both erupt 6–7 years, both largest molars.' },
{ cat:"pre-mol-comp", lec:"pre-mol", q:'Compare cusp numbers: lower 6 vs lower 7.', a:'Lower 6: 5 cusps; Lower 7: 4 cusps.' },
{ cat:"pre-mol-comp", lec:"pre-mol", q:'Compare cusp numbers: upper 6 vs upper 7.', a:'Upper 6: 4 main + Carabelli; Upper 7: 4 cusps, no Carabelli.' },
{ cat:"pre-mol-comp", lec:"pre-mol", q:'What groove shape distinguishes lower 6 from lower 7 on occlusal?', a:'Lower 6: M/zigzag shape; Lower 7: cross (+) shape.' },
{ cat:"pre-mol-comp", lec:"pre-mol", q:'Compare the root trunk of buccal vs lingual surface of lower 6.', a:'Buccal: 3mm; Lingual: 4mm (longer).' },
{ cat:"pre-mol-comp", lec:"pre-mol", q:'Compare lower 8 Type 1 vs Type 2.', a:'Type 1 (50%): resembles lower 7, 4 cusps, rectangular; Type 2 (40%): resembles lower 6, 5 cusps, hexagonal.' },
{ cat:"pre-mol-comp", lec:"pre-mol", q:'Which molar has the oblique ridge and what does it connect?', a:'Upper 6 (and upper 7); connects ML cusp to DB cusp.' },
{ cat:"pre-mol-comp", lec:"pre-mol", q:'Compare upper 6 vs upper 7 roots.', a:'Upper 6: widely divergent, 4mm trunk; Upper 7: more parallel, less divergent, all same length.' },
{ cat:"pre-mol-comp", lec:"pre-mol", q:'Name all eruption times for premolars (upper and lower).', a:'Upper 4: 10–11; Upper 5: 11–12; Lower 4: 10–11; Lower 5: 11–12.' },
{ cat:"pre-mol-comp", lec:"pre-mol", q:'Name all eruption times for molars.', a:'Upper/Lower 6: 6–7 yrs; Upper/Lower 7: 12–13 yrs; Upper/Lower 8: 18–21 yrs.' },
{ cat:"pre-mol-comp", lec:"pre-mol", q:'Which teeth are called "key of occlusion"?', a:'Lower 6 (mandibular first molar) and Upper 6 (maxillary first molar).' },
{ cat:"pre-mol-comp", lec:"pre-mol", q:'List all teeth with a Tubercle of Carabelli.', a:'Only Upper 6 (maxillary first molar).' },
{ cat:"pre-mol-comp", lec:"pre-mol", q:'Which premolar is the "king of fracture" and why?', a:'Upper 4, due to its small neck and short roots.' },
{ cat:"pre-mol-comp", lec:"pre-mol", q:'In lower 6, which root has 2 canals and which has 1?', a:'Mesial root: 2 canals; Distal root: 1 canal.' },
{ cat:"pre-mol-comp", lec:"pre-mol", q:'What is the pulp horn count for lower 6 and upper 4?', a:'Lower 6: 5 pulp horns; Upper 4: 2 pulp horns.' },
{ cat:"pre-mol-comp", lec:"pre-mol", q:'What makes lower 4 look like a canine from the lingual view?', a:'Short lingual cusp resembles a well-developed cingulum.' },
{ cat:"pre-mol-comp", lec:"pre-mol", q:'What dental organ number corresponds to each premolar?', a:'Upper 4 & Lower 4: 7 M.I.U; Upper 5 & Lower 5: 8 M.I.U.' },
{ cat:"pre-mol-comp", lec:"pre-mol", q:'Why is lower 5 larger than lower 4, but upper 4 is larger than upper 5?', a:'It is a rule in premolars: upper 4 > upper 5, but lower 4 < lower 5.' },
/* ══════════════════════════════════════════════════════
   PHYSIOLOGY OF TOOTH FORM — 100 Flashcards
   Dental Anatomy | Dr. Asma Ghoul | 2025–2026
══════════════════════════════════════════════════════ */
{ cat:"ptf-overview", lec:"tooth-form", q:'What is the role of physiologic tooth form?', a:'To protect the periodontium (gingiva, periodontal ligament, cementum, and alveolar bone).' },
{ cat:"ptf-overview", lec:"tooth-form", q:'What are the four components of the periodontium?', a:'Gingiva, periodontal ligament, cementum, and alveolar bone.' },
{ cat:"ptf-overview", lec:"tooth-form", q:'What is the specific shape of teeth and fundamental curvature important for? (list all 4)', a:'1) Maintenance of teeth in the dental arch. 2) Preventing caries and gingivitis. 3) Dispersing excessive occlusal force. 4) Protecting the periodontium.' },
{ cat:"ptf-overview", lec:"tooth-form", q:'Why is the shape of teeth important in preventing disease?', a:'It prevents caries and gingivitis by guiding food away and maintaining tissue health.' },
{ cat:"ptf-overview", lec:"tooth-form", q:'What happens if the tooth shape fails to disperse occlusal force properly?', a:'Excessive occlusal force can damage the periodontium.' },
{ cat:"ptf-overview", lec:"tooth-form", q:'Name the two main categories of factors for maintenance of hard and soft tissue hygiene.', a:'Direct factors and indirect factors.' },
{ cat:"ptf-overview", lec:"tooth-form", q:'List the 5 direct factors for tissue hygiene maintenance.', a:'1) Contact area. 2) Interproximal space. 3) Embrasure (spillways). 4) Facial and lingual height of contours. 5) Cervical line curvature on proximal surface.' },
{ cat:"ptf-overview", lec:"tooth-form", q:'List the 4 indirect factors for tissue hygiene maintenance.', a:'1) Crown-root ratio. 2) Cusp form. 3) Angulation of teeth. 4) Root number.' },
{ cat:"ptf-contact",  lec:"tooth-form", q:'Where is the contact area located on teeth?', a:'On the mesial and distal surfaces of teeth.' },
{ cat:"ptf-contact",  lec:"tooth-form", q:'How does the contact area differ between anterior and posterior teeth?', a:'Narrow in anterior teeth and wide in posterior teeth.' },
{ cat:"ptf-contact",  lec:"tooth-form", q:'How is the contact area situated in relation to food debris?', a:'Situated in a way that prevents food debris from packing between the teeth.' },
{ cat:"ptf-contact",  lec:"tooth-form", q:'What are the three significances of the contact area?', a:'1) Prevent food impaction. 2) Prevent tooth displacement. 3) Provide support and anchorage between adjacent teeth.' },
{ cat:"ptf-contact",  lec:"tooth-form", q:'Why does the contact area prevent tooth displacement?', a:'It provides support and anchorage between adjacent teeth, keeping them in position.' },
{ cat:"ptf-contact",  lec:"tooth-form", q:'What would happen if the contact area were absent?', a:'Food impaction would occur, teeth could displace, and there would be no anchorage between adjacent teeth.' },
{ cat:"ptf-contact",  lec:"tooth-form", q:'Compare the contact area of an anterior tooth vs. a posterior tooth.', a:'Anterior = narrow (point contact); Posterior = wide (broad, flat contact).' },
{ cat:"ptf-contact",  lec:"tooth-form", q:'The contact area is narrow in ___ teeth and wide in ___ teeth.', a:'Narrow in anterior; wide in posterior.' },
{ cat:"ptf-contact",  lec:"tooth-form", q:'What type of contact does the anterior contact area form?', a:'Point contact.' },
{ cat:"ptf-contact",  lec:"tooth-form", q:'What type of contact does the posterior contact area form?', a:'Broad, flat contact.' },
{ cat:"ptf-interprox",lec:"tooth-form", q:'What shape is the interproximal space?', a:'V-shaped.' },
{ cat:"ptf-interprox",lec:"tooth-form", q:'Where is the interproximal space located?', a:'Between the teeth (on proximal surfaces).' },
{ cat:"ptf-interprox",lec:"tooth-form", q:'Is the interproximal space wider cervically or incisally/occlusally?', a:'Wider cervically than incisally/occlusally.' },
{ cat:"ptf-interprox",lec:"tooth-form", q:'What fills the interproximal space normally?', a:'Gingival tissue (interdental papilla).' },
{ cat:"ptf-interprox",lec:"tooth-form", q:'What happens to the interproximal space when gingival recession occurs?', a:'The interdental papilla and bone do not fill the space, producing a cervical embrasure (pathological condition).' },
{ cat:"ptf-interprox",lec:"tooth-form", q:'Define cervical embrasure.', a:'A space produced between teeth when gingival recession occurs and the interdental papilla and bone no longer fill the interproximal space — it is a pathological condition.' },
{ cat:"ptf-interprox",lec:"tooth-form", q:'What are the three significances of the interproximal space?', a:'1) Space for gingiva. 2) Space for bone. 3) Space for blood supply.' },
{ cat:"ptf-interprox",lec:"tooth-form", q:'Is cervical embrasure a normal or pathological condition?', a:'Pathological condition.' },
{ cat:"ptf-interprox",lec:"tooth-form", q:'Why does the interproximal space being wider cervically matter?', a:'It allows space for the gingival tissue, bone, and blood supply.' },
{ cat:"ptf-interprox",lec:"tooth-form", q:'What fills the V-shaped interproximal space under healthy conditions?', a:'The interdental papilla (gingival tissue).' },
{ cat:"ptf-embrasure", lec:"tooth-form", q:'Define embrasure (spillway).', a:'Spaces between teeth that surround the contact area, located incisally/occlusally.' },
{ cat:"ptf-embrasure", lec:"tooth-form", q:'What are the four names of the embrasures based on location?', a:'Incisal, occlusal, facial, and lingual embrasures.' },
{ cat:"ptf-embrasure", lec:"tooth-form", q:'What is the fifth, pathological, type of embrasure?', a:'Cervical embrasure.' },
{ cat:"ptf-embrasure", lec:"tooth-form", q:'What are the four significances of embrasures?', a:'1) Allow food to be shunted away from contact area during mastication. 2) Reduce force of occlusal trauma. 3) Allow cleaning action. 4) Gingival massage.' },
{ cat:"ptf-embrasure", lec:"tooth-form", q:'How do embrasures protect the contact area?', a:'They allow food to be shunted away from the contact area during mastication.' },
{ cat:"ptf-embrasure", lec:"tooth-form", q:'Why are embrasures important during chewing?', a:'They divert food away from the contact area and reduce occlusal trauma forces.' },
{ cat:"ptf-embrasure", lec:"tooth-form", q:'Which embrasure is always pathological?', a:'Cervical embrasure.' },
{ cat:"ptf-embrasure", lec:"tooth-form", q:'What is the difference between interproximal space and embrasure?', a:'Interproximal space is the V-shaped cervical space filled by gingiva; embrasures are the spaces surrounding the contact area incisally/occlusally/facially/lingually.' },
{ cat:"ptf-embrasure", lec:"tooth-form", q:'How do embrasures contribute to gingival health?', a:'They allow gingival massage and cleaning action.' },
{ cat:"ptf-embrasure", lec:"tooth-form", q:'List all 5 types of embrasures by name.', a:'Incisal, occlusal, facial, lingual, and cervical (pathological).' },
{ cat:"ptf-contour",   lec:"tooth-form", q:'Where is the facial height of contour located for anterior teeth?', a:'At the cervical third of the crown.' },
{ cat:"ptf-contour",   lec:"tooth-form", q:'Where is the facial height of contour located for posterior teeth?', a:'At the cervical third of the crown.' },
{ cat:"ptf-contour",   lec:"tooth-form", q:'Where is the lingual height of contour for anterior teeth?', a:'At the cervical third (at the cingulum).' },
{ cat:"ptf-contour",   lec:"tooth-form", q:'Where is the lingual height of contour for posterior teeth?', a:'At the middle third.' },
{ cat:"ptf-contour",   lec:"tooth-form", q:'What are the four significances of facial and lingual height of contours?', a:'1) Allow proper food deflection. 2) Keep gingival margin protected. 3) Allow right amount of gingival massage. 4) Lingual contour allows tongue to rest for cleaning; facial contour allows cleaning by lip and cheek.' },
{ cat:"ptf-contour",   lec:"tooth-form", q:'How does lingual contour help in oral hygiene?', a:'It allows the tongue to rest against the tooth, providing the most efficient cleaning action.' },
{ cat:"ptf-contour",   lec:"tooth-form", q:'How does facial contour help in oral hygiene?', a:'It allows for cleaning by the lips and cheeks.' },
{ cat:"ptf-contour",   lec:"tooth-form", q:'What happens when there is over-contour of a tooth?', a:'Leads to food packing, then gingival inflammation.' },
{ cat:"ptf-contour",   lec:"tooth-form", q:'What happens when there is under-contour of a tooth?', a:'Leads to gingival recession.' },
{ cat:"ptf-contour",   lec:"tooth-form", q:'Compare the outcome of over-contour vs. under-contour.', a:'Over-contour → food packing → gingival inflammation. Under-contour → gingival recession.' },
{ cat:"ptf-contour",   lec:"tooth-form", q:'Why is the height of contour important for the gingival margin?', a:'It keeps the gingival margin protected by ensuring proper food deflection.' },
{ cat:"ptf-contour",   lec:"tooth-form", q:'The lingual height of contour differs between anterior and posterior teeth — how?', a:'Anterior: cervical third (cingulum). Posterior: middle third.' },
{ cat:"ptf-contour",   lec:"tooth-form", q:'The facial height of contour is at the ___ third for both anterior and posterior teeth.', a:'Cervical third.' },
{ cat:"ptf-contour",   lec:"tooth-form", q:'What structure marks the lingual height of contour on anterior teeth?', a:'The cingulum.' },
{ cat:"ptf-contour",   lec:"tooth-form", q:'Which is worse clinically — over-contour or under-contour?', a:'Both are harmful: over-contour causes inflammation, under-contour causes recession. Neither is acceptable.' },
{ cat:"ptf-cervical",  lec:"tooth-form", q:'What does the PDL attachment follow?', a:'The cervical line.' },
{ cat:"ptf-cervical",  lec:"tooth-form", q:'What does the periodontal ligament (PDL) attach?', a:'Cementum to bone, and gingiva to cementum.' },
{ cat:"ptf-cervical",  lec:"tooth-form", q:'What are the two factors affecting curvature of the cervical line?', a:'1) Faciolingual dimension. 2) Height of contact area.' },
{ cat:"ptf-cervical",  lec:"tooth-form", q:'What is the relationship between faciolingual dimension and cervical line curvature?', a:'Inversely proportional — the narrower the faciolingual dimension, the greater the cervical curvature.' },
{ cat:"ptf-cervical",  lec:"tooth-form", q:'Why do anterior teeth have greater cervical curvature than posterior teeth?', a:'Anterior teeth are narrower faciolingually, so they need more curvature incisally to gain anchorage and bony support.' },
{ cat:"ptf-cervical",  lec:"tooth-form", q:'Why do posterior teeth have less cervical curvature?', a:'They are wider buccolingually and already have more bony support.' },
{ cat:"ptf-cervical",  lec:"tooth-form", q:'What is the relationship between height of contact area and cervical curvature?', a:'Directly proportional — the higher the contact area, the greater the cervical curvature.' },
{ cat:"ptf-cervical",  lec:"tooth-form", q:'Is the cervical line more curved mesially or distally?', a:'More curved mesially.' },
{ cat:"ptf-cervical",  lec:"tooth-form", q:'Why is the cervical line more curved mesially than distally?', a:'Because most teeth have a higher mesial contact area than distal contact area.' },
{ cat:"ptf-cervical",  lec:"tooth-form", q:'Faciolingual dimension is ___ proportional to cervical curvature.', a:'Inversely proportional.' },
{ cat:"ptf-cervical",  lec:"tooth-form", q:'Height of contact area is ___ proportional to cervical curvature.', a:'Directly proportional.' },
{ cat:"ptf-cervical",  lec:"tooth-form", q:'Which teeth — anterior or posterior — have greater cervical curvature, and why?', a:'Anterior teeth, because they are narrower faciolingually and need more curvature for anchorage and bony support.' },
{ cat:"ptf-cervical",  lec:"tooth-form", q:'What fiber groups of the PDL attach cementum to bone and gingiva to cementum?', a:'Alveolar crest, horizontal, oblique, apical, inter-radicular, alveologingival, trans-septal, and circumferential fibers (dentino-gingival).' },
{ cat:"ptf-cervical",  lec:"tooth-form", q:'What is the significance of the cervical line curvature?', a:'It reflects the level of PDL attachment and therefore indicates the degree of periodontal support for the tooth.' },
{ cat:"ptf-indirect",  lec:"tooth-form", q:'What are the four indirect factors for tissue hygiene maintenance?', a:'1) Crown-root ratio. 2) Cusp form. 3) Angulation of teeth. 4) Root number.' },
{ cat:"ptf-indirect",  lec:"tooth-form", q:'What does crown-root ratio refer to as an indirect factor?', a:'The proportion between the crown and root length, which influences the tooth\'s ability to handle occlusal forces and maintain periodontal health.' },
{ cat:"ptf-indirect",  lec:"tooth-form", q:'How does cusp form act as an indirect factor?', a:'The shape of cusps affects force distribution and food deflection during mastication.' },
{ cat:"ptf-indirect",  lec:"tooth-form", q:'How does angulation of teeth act as an indirect factor?', a:'The tilt/angle of teeth in the arch influences force direction and tissue health.' },
{ cat:"ptf-indirect",  lec:"tooth-form", q:'How does root number act as an indirect factor?', a:'More roots provide greater surface area for PDL attachment and better anchorage and support.' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'What is the difference between a direct factor and an indirect factor in maintaining tissue hygiene?', a:'Direct factors (contact area, interproximal space, embrasures, height of contours, cervical line curvature) directly protect tissues. Indirect factors (crown-root ratio, cusp form, angulation, root number) support this indirectly through structural mechanics.' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'Which direct factor is described as V-shaped?', a:'Interproximal space.' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'Which direct factor prevents food impaction?', a:'Contact area (and also embrasures by diverting food away).' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'Which direct factor directly results in gingival massage?', a:'Embrasures (spillways).' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'What pathological condition results from gingival recession between teeth?', a:'Cervical embrasure.' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'Name all five direct factors from memory.', a:'1) Contact area. 2) Interproximal space. 3) Embrasures/spillways. 4) Facial and lingual height of contours. 5) Cervical line curvature on proximal surface.' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'What two things does the PDL connect?', a:'Cementum to bone AND gingiva to cementum.' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'Where is the contact area in relation to mesial and distal surfaces?', a:'It is located on the mesial and distal surfaces of adjacent teeth.' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'Explain how embrasures reduce occlusal trauma.', a:'They act as spillways during chewing, dispersing and redirecting food and force away from the contact area, thereby reducing impact on supporting structures.' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'Why is the cervical line more curved on the mesial side of most teeth?', a:'Because the mesial contact area is positioned higher than the distal contact area (height of contact area is directly proportional to cervical curvature).' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'What is the consequence of improper height of contour in a dental restoration?', a:'Over-contour → food packing → gingival inflammation. Under-contour → gingival recession.' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'Name a direct factor that differs between anterior and posterior teeth in terms of size.', a:'Contact area (narrow anteriorly, wide posteriorly).' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'Name a direct factor that differs between anterior and posterior teeth in terms of location.', a:'Lingual height of contour (cervical third anteriorly, middle third posteriorly).' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'What is the functional role of the interproximal space\'s V-shape?', a:'The wider cervical opening accommodates gingival tissue, bone, and blood supply, while tapering incisally/occlusally.' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'What does "directly proportional" mean in the context of height of contact area and cervical curvature?', a:'As the height of the contact area increases, the curvature of the cervical line also increases.' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'What does "inversely proportional" mean in the context of faciolingual dimension and cervical curvature?', a:'As the faciolingual width of the tooth increases (posterior), the cervical curvature decreases. As width decreases (anterior), curvature increases.' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'List three roles of the contact area.', a:'Prevent food impaction, prevent tooth displacement, support/anchorage between adjacent teeth.' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'List three roles of the interproximal space.', a:'Space for gingiva, space for bone, space for blood supply.' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'List four roles of the embrasures.', a:'Shunt food away from contact area, reduce occlusal trauma, allow cleaning action, gingival massage.' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'List four roles of the height of contours.', a:'Proper food deflection, protect gingival margin, gingival massage, allow tongue/lip/cheek cleaning.' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'What directly protects the periodontium according to the lecture?', a:'The physiologic tooth form (specific shape and fundamental curvature of teeth).' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'Why are there more roots in posterior teeth relevant to indirect factors?', a:'More roots = greater PDL surface area = better anchorage and bony support = better periodontal protection.' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'What structure in anterior teeth marks the lingual height of contour?', a:'The cingulum (cervical third).' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'What would the clinical consequence be of placing a crown with over-contour on the facial surface?', a:'Food packing under the crown margin, leading to gingival inflammation around the restoration.' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'What would the clinical consequence be of placing a crown with under-contour?', a:'Gingival recession due to lack of support and protection of the gingival margin.' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'The facial height of contour for BOTH anterior and posterior teeth is at the ___ third.', a:'Cervical third.' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'What is the role of the cingulum in tooth physiology?', a:'It marks the lingual height of contour for anterior teeth, aiding in food deflection, gingival protection, and tongue resting for cleaning.' },
{ cat:"ptf-mixed",     lec:"tooth-form", q:'Summarize the purpose of ALL direct factors in one concept.', a:'All direct factors work together to deflect food, protect gingival and bony tissues, provide anchorage, enable cleaning, and distribute forces — collectively maintaining the health of the periodontium.' },
/* ══════════════════════════════════════════════════════
   PULP CAVITY — 108 Flashcards
   Dental Anatomy | Dr. Fars Jamal Sasi | 2025–2026
══════════════════════════════════════════════════════ */
{ cat:"pc-func",    lec:"pulp-cavity", q:'What is the main function of the dental pulp?', a:'Production of dentine.' },
{ cat:"pc-func",    lec:"pulp-cavity", q:'List all four functions of the pulp cavity.', a:'1) Production of dentine. 2) Nutritive (blood vessels supply). 3) Sensory (nerve supply). 4) Defensive.' },
{ cat:"pc-func",    lec:"pulp-cavity", q:'What does the nutritive function of the pulp refer to?', a:'Blood vessel supply to the tooth.' },
{ cat:"pc-func",    lec:"pulp-cavity", q:'What does the sensory function of the pulp refer to?', a:'Nerve supply to the tooth.' },
{ cat:"pc-func",    lec:"pulp-cavity", q:'What is the pulp cavity?', a:'The cavity in the inner portion of the tooth containing the nerves and blood supply.' },
{ cat:"pc-func",    lec:"pulp-cavity", q:'Into what two main parts is the pulp cavity divided?', a:'Pulp chamber and root canals (pulp canals).' },
{ cat:"pc-chamber", lec:"pulp-cavity", q:'Define the pulp chamber.', a:'The most occlusal or incisal portion of the pulp cavity.' },
{ cat:"pc-chamber", lec:"pulp-cavity", q:'Where is the pulp chamber located in anterior teeth?', a:'Partly in the crown.' },
{ cat:"pc-chamber", lec:"pulp-cavity", q:'Where is the pulp chamber located in posterior teeth?', a:'In the cervical part of the root.' },
{ cat:"pc-chamber", lec:"pulp-cavity", q:'What forms the walls of the pulp chamber?', a:'The innermost surface of dentine.' },
{ cat:"pc-chamber", lec:"pulp-cavity", q:'What is the roof of the pulp chamber called, and what does it contain?', a:'The roof; it has projections called pulp horns.' },
{ cat:"pc-chamber", lec:"pulp-cavity", q:'What is found on the floor of the pulp chamber in multi-rooted teeth?', a:'The orifice (opening) for root canals.' },
{ cat:"pc-chamber", lec:"pulp-cavity", q:'In which teeth is there a floor in the pulp chamber?', a:'In multi-rooted (posterior) teeth, at the cervical portion.' },
{ cat:"pc-horns",   lec:"pulp-cavity", q:'Define pulp horn.', a:'A projection located at the incisal or occlusal border of the roof of the pulp chamber.' },
{ cat:"pc-horns",   lec:"pulp-cavity", q:'How many pulp horns do cusped teeth (molars, premolars, canines) normally have?', a:'One pulp horn per cusp.' },
{ cat:"pc-horns",   lec:"pulp-cavity", q:'How many pulp horns do incisors normally have?', a:'Three (one per facial lobe, same as one per mamelon).' },
{ cat:"pc-horns",   lec:"pulp-cavity", q:'What is the exception to the normal pulp horn count in incisors?', a:'The peg lateral incisor has only one pulp horn because its incisal edge resembles one cusp.' },
{ cat:"pc-horns",   lec:"pulp-cavity", q:'How many pulp horns does a canine have?', a:'One pulp horn (one per cusp).' },
{ cat:"pc-horns",   lec:"pulp-cavity", q:'How many pulp horns does a standard 2-cusp premolar have?', a:'Two pulp horns (one per cusp).' },
{ cat:"pc-horns",   lec:"pulp-cavity", q:'How many pulp horns does a mandibular second premolar (3-cusp type) have?', a:'Three pulp horns.' },
{ cat:"pc-horns",   lec:"pulp-cavity", q:'How many pulp horns does the mandibular first premolar have, and why?', a:'Often only one, similar to a canine, because its lingual cusp is functionless.' },
{ cat:"pc-horns",   lec:"pulp-cavity", q:'The number of pulp horns corresponds to what feature of a tooth?', a:'The number of cusps (one horn per cusp), except in incisors (three horns for three lobes).' },
{ cat:"pc-canals",  lec:"pulp-cavity", q:'Define root canals.', a:'Portions of the pulp cavity located within the roots of the tooth.' },
{ cat:"pc-canals",  lec:"pulp-cavity", q:'Where does the root canal begin?', a:'From the canal orifice on the floor of the pulp chamber.' },
{ cat:"pc-canals",  lec:"pulp-cavity", q:'Where do root canals open to the outside of the tooth?', a:'At the apical foramina.' },
{ cat:"pc-canals",  lec:"pulp-cavity", q:'What is the apical foramen?', a:'The opening at the apex of the root where the root canal exits the tooth.' },
{ cat:"pc-types",   lec:"pulp-cavity", q:'Describe Type I root canal.', a:'One canal extends from the pulp chamber all the way to the apex — one canal, one apical foramen.' },
{ cat:"pc-types",   lec:"pulp-cavity", q:'Describe Type II root canal.', a:'Two separate canals leave the pulp chamber but join short of the apex to form ONE canal apically — one apical foramen.' },
{ cat:"pc-types",   lec:"pulp-cavity", q:'Describe Type III root canal.', a:'Two separate canals leave the pulp chamber and remain separate throughout, exiting as two separate apical foramina.' },
{ cat:"pc-types",   lec:"pulp-cavity", q:'Describe Type IV root canal.', a:'One canal leaves the pulp chamber but divides in the apical third into two separate canals with two separate apical foramina.' },
{ cat:"pc-types",   lec:"pulp-cavity", q:'How many apical foramina does Type I have?', a:'One.' },
{ cat:"pc-types",   lec:"pulp-cavity", q:'How many apical foramina does Type II have?', a:'One (the two canals join before the apex).' },
{ cat:"pc-types",   lec:"pulp-cavity", q:'How many apical foramina does Type III have?', a:'Two (canals stay separate throughout).' },
{ cat:"pc-types",   lec:"pulp-cavity", q:'How many apical foramina does Type IV have?', a:'Two (one canal splits into two at the apical third).' },
{ cat:"pc-types",   lec:"pulp-cavity", q:'How many canals start from the pulp chamber in Type II?', a:'Two.' },
{ cat:"pc-types",   lec:"pulp-cavity", q:'How many canals start from the pulp chamber in Type IV?', a:'One.' },
{ cat:"pc-types",   lec:"pulp-cavity", q:'What is the key difference between Type II and Type III?', a:'Type II: two canals join into one apically (one foramen). Type III: two canals remain separate (two foramina).' },
{ cat:"pc-types",   lec:"pulp-cavity", q:'What is the key difference between Type I and Type IV?', a:'Type I: one canal stays one all the way to apex. Type IV: one canal splits into two at the apical third.' },
{ cat:"pc-types",   lec:"pulp-cavity", q:'Which type starts with one canal and ends with two?', a:'Type IV.' },
{ cat:"pc-types",   lec:"pulp-cavity", q:'Which type starts with two canals and ends with one?', a:'Type II.' },
{ cat:"pc-access",  lec:"pulp-cavity", q:'Define accessory (lateral) canals.', a:'Small additional canals branching off the main root canal.' },
{ cat:"pc-access",  lec:"pulp-cavity", q:'Where are accessory canals most commonly located?', a:'In the apical third of the root.' },
{ cat:"pc-access",  lec:"pulp-cavity", q:'In which teeth are accessory canals common in the furcation area?', a:'Maxillary and mandibular molars.' },
{ cat:"pc-access",  lec:"pulp-cavity", q:'What is the furcation area?', a:'The area where the roots divide/branch in multi-rooted teeth.' },
{ cat:"pc-anterior",lec:"pulp-cavity", q:'What does the pulp chamber of an incisor look like when cut mesiodistally and viewed from facial?', a:'It is broad and may appear as three pulp horns.' },
{ cat:"pc-anterior",lec:"pulp-cavity", q:'What does the pulp chamber of an anterior tooth look like when cut labiolingually and viewed from proximal?', a:'It tapers to a point toward the incisal edge.' },
{ cat:"pc-anterior",lec:"pulp-cavity", q:'How is the pulp chamber of canines different from incisors?', a:'In canines, the roof of the pulp chamber is often less pointed and has only one pulp horn.' },
{ cat:"pc-anterior",lec:"pulp-cavity", q:'How many roots do all anterior teeth most likely have?', a:'One root.' },
{ cat:"pc-anterior",lec:"pulp-cavity", q:'How many canals do anterior teeth most frequently have?', a:'One canal.' },
{ cat:"pc-anterior",lec:"pulp-cavity", q:'Which maxillary anterior teeth ALWAYS have one canal (Type I)?', a:'Maxillary central incisors, lateral incisors, and canines.' },
{ cat:"pc-anterior",lec:"pulp-cavity", q:'Can mandibular anterior teeth have two canals?', a:'Yes — they most likely have one but may have two canals (facial and lingual).' },
{ cat:"pc-anterior",lec:"pulp-cavity", q:'Which anterior tooth may have two roots, and what are they?', a:'The mandibular canine — may have one facial and one lingual root, with two root canals.' },
{ cat:"pc-premolar",lec:"pulp-cavity", q:'What does the pulp chamber of a premolar look like when cut mesiodistally and viewed from facial?', a:'The occlusal border/roof is curved beneath each cusp, mirroring the curvature of the occlusal surface.' },
{ cat:"pc-premolar",lec:"pulp-cavity", q:'What does the pulp chamber of a premolar look like when cut buccolingually and viewed from proximal?', a:'The pulp chamber has the general outline of the tooth surface.' },
{ cat:"pc-premolar",lec:"pulp-cavity", q:'How does the length of pulp horns relate to cusp heights in premolars?', a:'Relative lengths of pulp horns are similar to relative heights of cusps — buccal horns are longer than lingual horns.' },
{ cat:"pc-premolar",lec:"pulp-cavity", q:'How many roots does the maxillary first premolar most often have?', a:'Two roots — one buccal and one lingual.' },
{ cat:"pc-premolar",lec:"pulp-cavity", q:'How many canals does the maxillary first premolar most often have?', a:'Two canals (one in each root). Even with a single root, it almost always has two canals.' },
{ cat:"pc-premolar",lec:"pulp-cavity", q:'Is there any other root number possibility for the maxillary first premolar?', a:'Yes — there is a small incidence of three roots.' },
{ cat:"pc-premolar",lec:"pulp-cavity", q:'Where is the buccal canal orifice in the maxillary first premolar?', a:'Just lingual to the buccal cusp tip.' },
{ cat:"pc-premolar",lec:"pulp-cavity", q:'Where is the lingual canal orifice in the maxillary first premolar?', a:'Just lingual to the central groove.' },
{ cat:"pc-premolar",lec:"pulp-cavity", q:'How many roots does the maxillary second premolar most often have?', a:'One root (but two canals are frequently present).' },
{ cat:"pc-premolar",lec:"pulp-cavity", q:'If the maxillary second premolar has one canal, where is the orifice?', a:'In the exact center of the pulp chamber floor.' },
{ cat:"pc-premolar",lec:"pulp-cavity", q:'If the orifice of the maxillary second premolar is toward the buccal or lingual, what does this suggest?', a:'There are probably two canals in the root.' },
{ cat:"pc-premolar",lec:"pulp-cavity", q:'How many roots and canals do mandibular first and second premolars most frequently have?', a:'One root and one canal (Type I).' },
{ cat:"pc-premolar",lec:"pulp-cavity", q:'Can mandibular first premolars have two canals? What type would that be?', a:'Yes — Type IV (one canal divides into two in the apical third).' },
{ cat:"pc-premolar",lec:"pulp-cavity", q:'Where is the single canal orifice in the mandibular first premolar?', a:'On the floor of the pulp chamber, just buccal to the center of the occlusal surface.' },
{ cat:"pc-molar",   lec:"pulp-cavity", q:'How is the pulp chamber of maxillary first and second molars oriented?', a:'Broader buccolingually than mesiodistally.' },
{ cat:"pc-molar",   lec:"pulp-cavity", q:'How is the pulp chamber of mandibular first and second molars oriented?', a:'Broader mesiodistally than buccolingually.' },
{ cat:"pc-molar",   lec:"pulp-cavity", q:'How many roots does the maxillary first molar most frequently have?', a:'Three roots — mesiobuccal, distobuccal, and palatal.' },
{ cat:"pc-molar",   lec:"pulp-cavity", q:'How many canals does the maxillary first molar most frequently have?', a:'Four canals — two in the mesiobuccal root (MB1 and MB2), one in the distobuccal root, one in the palatal root.' },
{ cat:"pc-molar",   lec:"pulp-cavity", q:'Why does the maxillary first molar have more canals than roots?', a:'Because the mesiobuccal root contains two canals (MB1 and MB2).' },
{ cat:"pc-molar",   lec:"pulp-cavity", q:'How many roots and canals does the maxillary second molar most frequently have?', a:'Three roots and four canals (same as maxillary first molar).' },
{ cat:"pc-molar",   lec:"pulp-cavity", q:'How many roots and canals do both mandibular first and second molars most frequently have?', a:'Two roots (mesial and distal) and three canals.' },
{ cat:"pc-molar",   lec:"pulp-cavity", q:'In mandibular molars, which root has two canals?', a:'The wider mesial root — mesiobuccal and mesiolingual canals.' },
{ cat:"pc-molar",   lec:"pulp-cavity", q:'In mandibular molars, which root usually has only one canal?', a:'The narrower distal root.' },
{ cat:"pc-molar",   lec:"pulp-cavity", q:'How many root canals does the maxillary third molar usually have?', a:'Three.' },
{ cat:"pc-molar",   lec:"pulp-cavity", q:'How many root canals does the mandibular third molar usually have?', a:'Two.' },
{ cat:"pc-aging",   lec:"pulp-cavity", q:'How does the pulp chamber appear in a young tooth?', a:'Large and resembling the shape of the crown surface.' },
{ cat:"pc-aging",   lec:"pulp-cavity", q:'Why does the pulp chamber become smaller with age?', a:'Because secondary (additional) dentin is deposited on its walls by specialized cells called odontoblasts.' },
{ cat:"pc-aging",   lec:"pulp-cavity", q:'What are odontoblasts?', a:'Specialized cells lining the pulp chamber that produce secondary dentin.' },
{ cat:"pc-aging",   lec:"pulp-cavity", q:'What is secondary dentin?', a:'Additional dentin deposited on the walls of the pulp cavity throughout life, making the pulp chamber progressively smaller.' },
{ cat:"pc-aging",   lec:"pulp-cavity", q:'As long as what condition exists, will dentin formation continue?', a:'As long as the pulp is intact (vital).' },
{ cat:"pc-aging",   lec:"pulp-cavity", q:'What happens to dentin formation if the pulp dies?', a:'Dentin formation ceases, and the pulp chamber size remains constant (stops decreasing).' },
{ cat:"pc-aging",   lec:"pulp-cavity", q:'What happens to root canal diameter with age?', a:'It decreases — gets smaller due to gradual addition of dentin on the internal walls.' },
{ cat:"pc-aging",   lec:"pulp-cavity", q:'What is the clinical implication of a non-vital pulp on pulp chamber size?', a:'Without vital pulp, dentin formation stops, so the chamber no longer shrinks as it does in vital teeth.' },
{ cat:"pc-aging",   lec:"pulp-cavity", q:'Compare pulp chamber size in a young vs. an old tooth.', a:'Young tooth: large, resembles crown shape. Old tooth: smaller due to secondary dentin deposition.' },
{ cat:"pc-clinical",lec:"pulp-cavity", q:'Why is knowledge of pulp shape important in restorative dentistry?', a:'It helps the dentist prepare teeth with deep decay without inadvertently exposing or damaging the pulp.' },
{ cat:"pc-clinical",lec:"pulp-cavity", q:'What is the goal when restoring a tooth with deep decay (without pulp removal)?', a:'To leave some sound (undecayed) dentin on the cavity floor to support the restoration.' },
{ cat:"pc-clinical",lec:"pulp-cavity", q:'What tools help the dentist determine pulp location before restoration?', a:'Knowledge of pulp chamber shape and careful evaluation of radiographs.' },
{ cat:"pc-clinical",lec:"pulp-cavity", q:'Define endodontics.', a:'A specialty branch of dentistry concerned with the morphology, physiology, and pathology of human dental pulp and periapical tissues.' },
{ cat:"pc-clinical",lec:"pulp-cavity", q:'Who is an endodontist?', a:'A dentist who specializes in endodontics (root canal therapy), treating complex endodontic cases referred from general dentists.' },
{ cat:"pc-clinical",lec:"pulp-cavity", q:'Define irreversible pulpitis.', a:'Inflammation of the pulp that cannot heal, requiring root canal treatment.' },
{ cat:"pc-clinical",lec:"pulp-cavity", q:'Define periapical disease.', a:'A condition that occurs when the pulp has died (become necrotic).' },
{ cat:"pc-clinical",lec:"pulp-cavity", q:'What are the three goals of endodontic therapy?', a:'1) Relieve pain. 2) Control infection. 3) Preserve the tooth for normal masticatory function.' },
{ cat:"pc-clinical",lec:"pulp-cavity", q:'Why is endodontic treatment generally preferred over extraction?', a:'If extracted, the patient would be without that tooth during healing and throughout the time needed to construct and place a replacement tooth.' },
{ cat:"pc-mixed",   lec:"pulp-cavity", q:'Compare the location of the pulp chamber in anterior vs. posterior teeth.', a:'Anterior: partly in the crown. Posterior: in the cervical part of the root.' },
{ cat:"pc-mixed",   lec:"pulp-cavity", q:'What is the difference between the pulp chamber and the root canal?', a:'Pulp chamber is the occlusal/incisal portion; root canals are within the roots below the chamber.' },
{ cat:"pc-mixed",   lec:"pulp-cavity", q:'Name all four types of root canals from memory with their key feature.', a:'Type I: 1 canal → 1 foramen. Type II: 2 canals → join → 1 foramen. Type III: 2 canals → 2 foramina. Type IV: 1 canal → splits → 2 foramina.' },
{ cat:"pc-mixed",   lec:"pulp-cavity", q:'The maxillary first premolar has ___ roots and ___ canals.', a:'2 roots; 2 canals (almost always, even with 1 root).' },
{ cat:"pc-mixed",   lec:"pulp-cavity", q:'The maxillary first molar has ___ roots and ___ canals.', a:'3 roots; 4 canals (2 in the mesiobuccal root: MB1 and MB2).' },
{ cat:"pc-mixed",   lec:"pulp-cavity", q:'The mandibular first molar has ___ roots and ___ canals.', a:'2 roots (mesial, distal); 3 canals (2 mesial + 1 distal).' },
{ cat:"pc-mixed",   lec:"pulp-cavity", q:'Which tooth type in the mandible is the exception that may have two roots?', a:'The mandibular canine (one facial root and one lingual root).' },
{ cat:"pc-mixed",   lec:"pulp-cavity", q:'What makes the peg lateral incisor exceptional regarding pulp horns?', a:'Despite being an incisor (which normally has 3 horns), the peg lateral has only 1 pulp horn because its incisal edge resembles a single cusp.' },
{ cat:"pc-mixed",   lec:"pulp-cavity", q:'How do you clinically identify that a maxillary second premolar likely has two canals?', a:'If the orifice on the pulp chamber floor is located toward the buccal or lingual (not centered), two canals are likely present.' },
{ cat:"pc-mixed",   lec:"pulp-cavity", q:'What determines the relative length of pulp horns in premolars?', a:'The relative heights of the cusps — longer pulp horns under taller (buccal) cusps, shorter under lower (lingual) cusps.' },
{ cat:"pc-mixed",   lec:"pulp-cavity", q:'What continues as long as the pulp remains vital?', a:'Dentin formation (secondary dentin deposition).' },
{ cat:"pc-mixed",   lec:"pulp-cavity", q:'Describe the pulp chamber shape difference between maxillary and mandibular molars.', a:'Maxillary molars: broader buccolingually. Mandibular molars: broader mesiodistally.' },
{ cat:"pc-mixed",   lec:"pulp-cavity", q:'Where are accessory canals most commonly found in molars?', a:'In the furcation area (where roots divide).' },
