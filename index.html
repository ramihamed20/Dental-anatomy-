{ cat:"introduction", lec:"intro", q:'In the Universal system, what tooth is #32?', a:'Lower right third molar.' },
{ cat:"introduction", lec:"intro", q:'How does the Universal system label deciduous teeth?', a:'By letters A to T (20 letters for 20 deciduous teeth), starting from upper right second molar.' },
{ cat:"introduction", lec:"intro", q:'In the Universal system, numbers are preceded by which symbol?', a:'The # (hash/number) sign.' },
{ cat:"introduction", lec:"intro", q:'What 4 items make up a complete tooth name?', a:'1-Permanent or deciduous, 2-Upper or lower, 3-Right or left, 4-Tooth type.' },
{ cat:"introduction", lec:"intro", q:'Give a full tooth name example.', a:'Deciduous / Lower / Left / Second molar. OR Permanent / Lower / Right / Canine.' },
{ cat:"introduction", lec:"intro", q:'What are the main external parts of each tooth?', a:'Crown, Root, and Cervical line (neck/CEJ).' },
{ cat:"introduction", lec:"intro", q:'What is the cervical line (neck)?', a:'The line joining (junction between) the crown and root — also called CEJ (cemento-enamel junction).' },
{ cat:"introduction", lec:"intro", q:'What covers the crown of a tooth?', a:'Enamel.' },
{ cat:"introduction", lec:"intro", q:'What covers the root of a tooth?', a:'Cementum.' },
{ cat:"introduction", lec:"intro", q:'How many structures does a tooth have?', a:'4 structures — 3 hard tissues and 1 soft tissue.' },
{ cat:"introduction", lec:"intro", q:'What are the 3 hard tissues of the tooth?', a:'Enamel, Dentin, Cementum.' },
{ cat:"introduction", lec:"intro", q:'What is the 1 soft tissue of the tooth?', a:'Pulp.' },
{ cat:"introduction", lec:"intro", q:'What is enamel?', a:'The hardest (most mineralized) tissue in the human body — covers the anatomical crown.' },
{ cat:"introduction", lec:"intro", q:'What percentage of mineral (calcium) does enamel contain?', a:'96% CA (calcium).' },
{ cat:"introduction", lec:"intro", q:'Where is enamel thickest and thinnest?', a:'Thickest at cusp tip; thinnest at the cervical line.' },
{ cat:"introduction", lec:"intro", q:'What is cementum?', a:'The less hard (mineralized) tissue — covers the anatomical root.' },
{ cat:"introduction", lec:"intro", q:'What percentage of mineral does cementum contain?', a:'45% CA.' },
{ cat:"introduction", lec:"intro", q:'What color is cementum?', a:'Pale yellow.' },
{ cat:"introduction", lec:"intro", q:'Where is cementum thickest and thinnest?', a:'Thin at the cervical line; increases in thickness toward the root apex.' },
{ cat:"introduction", lec:"intro", q:'What is dentin?', a:'The main bulk of the tooth (forms both crown and root), second hardest tissue in the tooth.' },
{ cat:"introduction", lec:"intro", q:'What percentage of mineral does dentin contain?', a:'70% CA.' },
{ cat:"introduction", lec:"intro", q:'What covers dentin in the crown? In the root?', a:'In the crown — covered by enamel; in the root — covered by cementum.' },
{ cat:"introduction", lec:"intro", q:'What color is dentin?', a:'Light yellow.' },
{ cat:"introduction", lec:"intro", q:'What is a special property of dentin?', a:'It is elastic.' },
{ cat:"introduction", lec:"intro", q:'How does dentin hardness compare?', a:'Less hard than enamel, but harder than cementum and bone.' },
{ cat:"introduction", lec:"intro", q:'What is pulp?', a:'The soft tissue present in the central cavity of the tooth.' },
{ cat:"introduction", lec:"intro", q:'What does pulp contain?', a:'Blood vessels and nerves.' },
{ cat:"introduction", lec:"intro", q:'What happens to pulp size with age?', a:'Pulp decreases in size with age due to continuous deposition of dentin.' },
{ cat:"introduction", lec:"intro", q:'What are the parts of the pulp cavity?', a:'Pulp chamber, pulp horn, pulp canal (root canal), pulp orifice, apical foramen, accessory (lateral) canal.' },
{ cat:"introduction", lec:"intro", q:'What is the pulp chamber?', a:'The part of pulp found in the crown — has 6 surfaces.' },
{ cat:"introduction", lec:"intro", q:'What is the pulp horn?', a:'An elongation on the roof of the pulp chamber.' },
{ cat:"introduction", lec:"intro", q:'What is the pulp canal (root canal)?', a:'The part of pulp found in the root.' },
{ cat:"introduction", lec:"intro", q:'What is the pulp orifice?', a:'The opening at the floor of the pulp chamber connecting it to the root canal.' },
{ cat:"introduction", lec:"intro", q:'What is the apical foramen?', a:'A small opening at the end (tip) of the pulp canal, at the root apex.' },
{ cat:"introduction", lec:"intro", q:'What is the accessory (lateral) root canal?', a:'A lateral branch from the main root canal — most common in the apical 1/3 of the root.' },
{ cat:"introduction", lec:"intro", q:'Which teeth have a single root?', a:'All incisors and canines (anterior teeth), plus all premolars EXCEPT upper first premolar (upper 4).' },
{ cat:"introduction", lec:"intro", q:'Which teeth have double roots (two roots)?', a:'All lower molars (6, 7, 8) and the upper first premolar (upper 4).' },
{ cat:"introduction", lec:"intro", q:'Which teeth have triple roots (three roots)?', a:'All upper molars (6, 7, 8).' },
{ cat:"introduction", lec:"intro", q:'What are the parts of the root?', a:'Root trunk, bifurcation area, trifurcation area, furcal region, root apex.' },
{ cat:"introduction", lec:"intro", q:'What is the root trunk?', a:'The undivided area of the root.' },
{ cat:"introduction", lec:"intro", q:'What is the bifurcation area?', a:'The area where the root trunk divides into two roots (in lower molars).' },
{ cat:"introduction", lec:"intro", q:'What is the trifurcation area?', a:'The area where the root trunk divides into three roots (in upper molars).' },
{ cat:"introduction", lec:"intro", q:'What is the furcal region?', a:'The region or space between two or three roots.' },
{ cat:"introduction", lec:"intro", q:'What is the root apex?', a:'The tip at the end of the root.' },
{ cat:"introduction", lec:"intro", q:'How many types are in the Wein classification for root canal morphology?', a:'4 types.' },
{ cat:"introduction", lec:"intro", q:'Describe Type 1 of Wein classification.', a:'One orifice → one canal → one apical foramen.' },
{ cat:"introduction", lec:"intro", q:'Describe Type 2 of Wein classification.', a:'Two orifices → two canals → one apical foramen (canals merge).' },
{ cat:"introduction", lec:"intro", q:'Describe Type 3 of Wein classification.', a:'Two orifices → two canals → two apical foramina.' },
{ cat:"introduction", lec:"intro", q:'Describe Type 4 of Wein classification.', a:'One orifice → one canal → two apical foramina (canal splits).' },
{ cat:"introduction", lec:"intro", q:'What is the difference between Type 1 and Type 4 in Wein classification?', a:'Both start with 1 orifice and 1 canal, but Type 1 ends with 1 apical foramen while Type 4 ends with 2 apical foramina.' },
{ cat:"introduction", lec:"intro", q:'What is the difference between Type 2 and Type 3 in Wein classification?', a:'Both have 2 orifices and 2 canals, but Type 2 has 1 apical foramen (canals join) while Type 3 has 2 apical foramina.' },
{ cat:"introduction", lec:"intro", q:'What are the 4 supporting tooth structures?', a:'1-Cementum, 2-PDL (Periodontal ligament), 3-Alveolar process, 4-Gingiva.' },
{ cat:"introduction", lec:"intro", q:'What is the alveolar process?', a:'The bone of the jaws that surrounds the root of teeth.' },
{ cat:"introduction", lec:"intro", q:'What is the periodontal ligament (PDL)?', a:'The soft dense fibrous tissue that attaches the tooth to the bone.' },
{ cat:"introduction", lec:"intro", q:'What is the gingiva?', a:'The soft fibrous tissue that covers the root, PDL, and bone up to the neck (cervical line) of the teeth.' },
{ cat:"introduction", lec:"intro", q:'What is the anatomical crown?', a:'The part of the tooth covered by enamel.' },
{ cat:"introduction", lec:"intro", q:'What is the anatomical root?', a:'The part of the tooth covered by cementum.' },
{ cat:"introduction", lec:"intro", q:'What is the clinical crown?', a:'The part of the tooth visible in the oral cavity (can be crown or root portion).' },
{ cat:"introduction", lec:"intro", q:'What is the clinical root?', a:'The part of the tooth invisible (hidden) in the oral cavity (can be crown or root portion).' },
{ cat:"introduction", lec:"intro", q:'What is the difference between anatomical and clinical crown?', a:'Anatomical crown = covered by enamel (fixed); Clinical crown = what is visible in the mouth (varies by gum level).' },
{ cat:"introduction", lec:"intro", q:'Where does tooth development (crown and root formation) occur?', a:'In a bony crypt or socket.' },
{ cat:"introduction", lec:"intro", q:'When does a tooth start to erupt into the oral cavity?', a:'After the crown is completed and about one-third of the root is formed.' },
{ cat:"introduction", lec:"intro", q:'When is tooth formation considered complete?', a:'When the root apex is formed.' },
{ cat:"introduction", lec:"intro", q:'How long after tooth eruption does the root complete in permanent teeth?', a:'3 years after eruption.' },
{ cat:"introduction", lec:"intro", q:'How long after tooth eruption does the root complete in deciduous teeth?', a:'1.5 years after eruption.' },
{ cat:"introduction", lec:"intro", q:'What is a crypt?', a:'A bony space containing a developed but un-erupted tooth.' },
{ cat:"introduction", lec:"intro", q:'What is a socket?', a:'A bony space containing the root of an erupted tooth.' },
{ cat:"introduction", lec:"intro", q:'State the 3 general rules of tooth eruption.', a:'1) Mandibular teeth erupt earlier than maxillary teeth. 2) Teeth erupt earlier in girls than boys. 3) Teeth in both jaws erupt in pairs.' },
{ cat:"introduction", lec:"intro", q:'When does deciduous dentition eruption begin and end?', a:'Begins at 6 months after birth; ends at 24 months (2 years).' },
{ cat:"introduction", lec:"intro", q:'Which is the first primary tooth to erupt, and when?', a:'Deciduous lower central incisor (A) — at 6 months after birth.' },
{ cat:"introduction", lec:"intro", q:'Which is the last primary tooth to erupt, and when?', a:'Deciduous upper second molar (E) — at 24 months.' },
{ cat:"introduction", lec:"intro", q:'What is the sequence of eruption of deciduous teeth?', a:'A → B → D → C → E.' },
{ cat:"introduction", lec:"intro", q:'How much variation is considered normal for deciduous tooth eruption?', a:'4-6 months earlier or later than average is normal.' },
{ cat:"introduction", lec:"intro", q:'What is the best method to detect an un-erupted or missing tooth?', a:'Dental radiograph (X-ray).' },
{ cat:"introduction", lec:"intro", q:'What are the eruption ages for each deciduous tooth in the lower arch?', a:'A=6m, B=7m, C=16m, D=12m, E=20m.' },
{ cat:"introduction", lec:"intro", q:'What are the eruption ages for each deciduous tooth in the upper arch?', a:'A=7m, B=8m, C=18m, D=14m, E=24m.' },
{ cat:"introduction", lec:"intro", q:'What is the sequence of eruption of lower permanent teeth?', a:'6 → 1 → 2 → 3 → 4 → 5 → 7 → 8.' },
{ cat:"introduction", lec:"intro", q:'What is the sequence of eruption of upper permanent teeth?', a:'6 → 1 → 2 → 4 → 5 → 3 → 7 → 8.' },
{ cat:"introduction", lec:"intro", q:'What is eruption (definition)?', a:'Axial movement of the tooth from its developmental position in bone to its functional position in the mouth.' },
{ cat:"introduction", lec:"intro", q:'What is shedding (exfoliation)?', a:'The physiological elimination of deciduous teeth due to resorption of their roots.' },
{ cat:"introduction", lec:"intro", q:'What causes shedding of deciduous teeth?', a:'Pressure from the permanent tooth germ growing under the deciduous roots causes root resorption and PDL destruction until the crown becomes loose and falls out.' },
{ cat:"introduction", lec:"intro", q:'What is mixed dentition?', a:'When both deciduous and permanent teeth are present in the mouth at the same time.' },
{ cat:"introduction", lec:"intro", q:'What age range does mixed dentition cover?', a:'From 6 years to 12 years.' },
{ cat:"introduction", lec:"intro", q:'How many surfaces does each tooth have?', a:'Five surfaces.' },
{ cat:"introduction", lec:"intro", q:'List the 5 surfaces of each tooth.', a:'1-Outer/facial, 2-Inner/lingual or palatal, 3-Mesial, 4-Distal, 5-Masticatory.' },
{ cat:"introduction", lec:"intro", q:'What is the outer (facial) surface called in anterior teeth?', a:'Labial surface (faces the lip).' },
{ cat:"introduction", lec:"intro", q:'What is the outer (facial) surface called in posterior teeth?', a:'Buccal surface (faces the cheek).' },
{ cat:"introduction", lec:"intro", q:'What is the inner surface called in lower teeth?', a:'Lingual surface (faces the tongue).' },
{ cat:"introduction", lec:"intro", q:'What is the inner surface called in upper teeth?', a:'Palatal surface (faces the palate).' },
{ cat:"introduction", lec:"intro", q:'What is the mesial surface?', a:'The surface toward or close to the midline.' },
{ cat:"introduction", lec:"intro", q:'What is the distal surface?', a:'The surface away from the midline.' },
{ cat:"introduction", lec:"intro", q:'What is the masticatory surface called in anterior teeth (1, 2, 3)?', a:'Incisal edge.' },
{ cat:"introduction", lec:"intro", q:'What is the masticatory surface called in posterior teeth (4, 5, 6, 7, 8)?', a:'Occlusal surface (chewing surface).' },
{ cat:"introduction", lec:"intro", q:'Why is the tooth surface divided into thirds?', a:'To make the study of tooth anatomy easier.' },
{ cat:"introduction", lec:"intro", q:'How can the tooth be divided into thirds?', a:'Horizontally or vertically.' },
{ cat:"introduction", lec:"intro", q:'What are the 3 horizontal thirds of the crown?', a:'Cervical third, Middle third, Incisal/Occlusal third.' },
{ cat:"introduction", lec:"intro", q:'What are the 3 horizontal thirds of the root?', a:'Cervical third, Middle third, Apical third.' },
{ cat:"introduction", lec:"intro", q:'What are the 3 vertical thirds of the tooth?', a:'Mesial third, Middle third, Distal third.' },
{ cat:"introduction", lec:"intro", q:'What is a line angle?', a:'A line formed by the junction of two surfaces.' },
{ cat:"introduction", lec:"intro", q:'How many line angles do anterior teeth have?', a:'6 line angles.' },
{ cat:"introduction", lec:"intro", q:'How many line angles do posterior teeth have?', a:'8 line angles.' },
{ cat:"introduction", lec:"intro", q:'What is a point angle?', a:'A point formed by the junction of three surfaces.' },
{ cat:"introduction", lec:"intro", q:'How many point angles do anterior teeth have?', a:'4 point angles.' },
{ cat:"introduction", lec:"intro", q:'How many point angles do posterior teeth have?', a:'4 point angles.' },
{ cat:"introduction", lec:"intro", q:'What is the difference between a line angle and a point angle?', a:'Line angle = junction of 2 surfaces; Point angle = junction of 3 surfaces.' },
{ cat:"introduction", lec:"intro", q:'What is a lobe in tooth anatomy?', a:'The primary center of calcification during crown development.' },
{ cat:"introduction", lec:"intro", q:'What are the 3 forms that represent a lobe?', a:'Mamelon, Cingulum, Cusp.' },
{ cat:"introduction", lec:"intro", q:'What are the 5 types of crown elevation?', a:'1-Cusp, 2-Mamelon, 3-Cingulum, 4-Tubercle, 5-Ridge.' },
{ cat:"introduction", lec:"intro", q:'What is a cusp?', a:'A pyramidal elevation on the occlusal surface of premolars and molars, and on the incisal edge of canines.' },
{ cat:"introduction", lec:"intro", q:'What structures form a cusp?', a:'Enamel, dentin, and pulp horn.' },
{ cat:"introduction", lec:"intro", q:'How many cusps does each tooth type have?', a:'Incisors = 0, Canine = 1, Premolar = 2, Molar = 4 or 5.' },
{ cat:"introduction", lec:"intro", q:'What is a mamelon?', a:'Three small rounded elevations found on the incisal ridge of newly erupted incisors.' },
{ cat:"introduction", lec:"intro", q:'What happens to mamelons after eruption?', a:'They are normally removed soon after eruption by attrition (wear).' },
{ cat:"introduction", lec:"intro", q:'What is a cingulum?', a:'A rounded elevation on the cervical third of the lingual surface of all anterior teeth (incisors and canines).' },
{ cat:"introduction", lec:"intro", q:'What is a tubercle?', a:'A small rounded elevation found on the lingual surface of upper 6 (maxillary first molar) and upper E (deciduous second molar).' },
{ cat:"introduction", lec:"intro", q:'What is a tubercle made of?', a:'Extra enamel formation — enamel only.' },
{ cat:"introduction", lec:"intro", q:'What is another name for the tubercle of Carabelli?', a:'It is the tubercle found on the lingual surface of upper 6 and upper E.' },
{ cat:"introduction", lec:"intro", q:'What is a ridge?', a:'A linear elevation present on different surfaces of the crown — has 9 types.' },
{ cat:"introduction", lec:"intro", q:'What are the ridges found on the facial (labial/buccal) surface?', a:'Labial ridge, Buccal ridge, Cervical ridge.' },
{ cat:"introduction", lec:"intro", q:'Where is the labial ridge found?', a:'On the labial surface of canine ONLY.' },
{ cat:"introduction", lec:"intro", q:'Where is the buccal ridge found?', a:'On the buccal surface of premolars.' },
{ cat:"introduction", lec:"intro", q:'Where is the cervical ridge found?', a:'On the cervical third of the facial surface (labial and buccal) of ALL teeth.' },
{ cat:"introduction", lec:"intro", q:'What are the ridges on the lingual surface of teeth?', a:'Incisal ridge, Lingual ridge, Marginal ridge (mesial and distal).' },
{ cat:"introduction", lec:"intro", q:'Where is the incisal ridge found?', a:'On the lingual surface of all anterior teeth.' },
{ cat:"introduction", lec:"intro", q:'Where is the lingual ridge found?', a:'On the lingual surface of canine ONLY — extends from cusp tip to cingulum and divides the lingual fossa into two fossae.' },
{ cat:"introduction", lec:"intro", q:'What are marginal ridges?', a:'Two linear elevations at the margins of the lingual surface of anterior teeth (1, 2, 3) — mesial marginal ridge (MMR) and distal marginal ridge (DMR).' },
{ cat:"introduction", lec:"intro", q:'What are the ridges on the occlusal surface of posterior teeth?', a:'Marginal ridge, Triangular ridge, Transverse ridge, Oblique ridge.' },
{ cat:"introduction", lec:"intro", q:'What is a triangular ridge?', a:'A linear elevation found at the margin of the occlusal surface of posterior teeth.' },
{ cat:"introduction", lec:"intro", q:'What is a transverse ridge?', a:'A linear elevation formed from the union of two triangular ridges of cusps facing each other — found on the occlusal surface of lower premolars.' },
{ cat:"introduction", lec:"intro", q:'What is an oblique ridge?', a:'The union of two triangular ridges of cusps NOT facing each other — found on the occlusal surface of upper molars 6, 7, 8 (from mesiolingual cusp to distobuccal cusp).' },
{ cat:"introduction", lec:"intro", q:'What are the 6 types of crown depression?', a:'1-Developmental groove, 2-Supplemental groove, 3-Fissure, 4-Sulcus, 5-Fossa, 6-Pit.' },
{ cat:"introduction", lec:"intro", q:'What is a developmental groove?', a:'A linear depression that marks the union between two cusps — found on the occlusal surface of posterior teeth and extends to buccal and lingual surfaces.' },
{ cat:"introduction", lec:"intro", q:'What is a supplemental groove?', a:'A linear depression that does NOT mark the union between two cusps — it is a branch from the developmental groove.' },
{ cat:"introduction", lec:"intro", q:'Difference between developmental and supplemental groove?', a:'Developmental groove = union between cusps; Supplemental groove = not between cusps, branches from developmental groove.' },
{ cat:"introduction", lec:"intro", q:'What is a fissure?', a:'A linear depression found at the bottom of a developmental groove — results from incomplete fusion between lobes (cusps).' },
{ cat:"introduction", lec:"intro", q:'What is a sulcus?', a:'A broad depression on the occlusal surface of posterior teeth, found between the inclines of cusps.' },
{ cat:"introduction", lec:"intro", q:'What is a fossa?', a:'An irregular rounded depression (concavity) on the tooth — named according to shape and site.' },
{ cat:"introduction", lec:"intro", q:'What are the 3 types of fossa?', a:'1-Lingual fossa, 2-Mesial and distal triangular fossa, 3-Central (circular) fossa.' },
{ cat:"introduction", lec:"intro", q:'Where is the lingual fossa found?', a:'On the lingual surface of anterior teeth (1, 2, 3).' },
{ cat:"introduction", lec:"intro", q:'Where are the mesial and distal triangular fossae found?', a:'On the occlusal surface of posterior teeth (premolars and molars), near the marginal ridge.' },
{ cat:"introduction", lec:"intro", q:'Where is the central (circular) fossa found?', a:'On the CENTER of the occlusal surface of molars ONLY.' },
{ cat:"introduction", lec:"intro", q:'What is a pit?', a:'A small pinpoint depression present at the depth (bottom) of each fossa.' },
{ cat:"introduction", lec:"intro", q:'What are the 2 types of pit?', a:'True pit and Fault pit.' },
{ cat:"introduction", lec:"intro", q:'What is a true pit?', a:'A pinpoint depression at the bottom of the central fossa or mesial/distal fossa on the occlusal surface.' },
{ cat:"introduction", lec:"intro", q:'What is a fault pit?', a:'A pinpoint depression at the end of a developmental groove on the buccal surface of molars.' },
{ cat:"introduction", lec:"intro", q:'What is diastema?', a:'A space present between two adjacent teeth — most commonly between the two upper central incisors.' },
{ cat:"introduction", lec:"intro", q:'What is a contact area?', a:'The area where adjacent teeth contact each other.' },
{ cat:"introduction", lec:"intro", q:'What are retained deciduous teeth?', a:'Deciduous teeth that have NOT shed at the expected time of shedding.' },
{ cat:"introduction", lec:"intro", q:'Where is retained deciduous teeth most commonly seen?', a:'Most commonly in upper lateral incisor (B), then lower deciduous second molar (E).' },
{ cat:"introduction", lec:"intro", q:'What is a mesiodense?', a:'An extra tooth in the mouth (supernumerary tooth) making the total more than 32 — occurs between the two upper central incisors.' },
{ cat:"introduction", lec:"intro", q:'Without hints — name the 4 tooth structures in order from hardest to softest.', a:'Enamel (96% CA) → Dentin (70% CA) → Cementum (45% CA) → Pulp (no mineral).' },
{ cat:"introduction", lec:"intro", q:'Without hints — name all 5 types of crown elevation.', a:'Cusp, Mamelon, Cingulum, Tubercle, Ridge.' },
{ cat:"introduction", lec:"intro", q:'Without hints — name all 6 types of crown depression.', a:'Developmental groove, Supplemental groove, Fissure, Sulcus, Fossa, Pit.' },
{ cat:"introduction", lec:"intro", q:'Without hints — which 3 numbering systems are used for teeth?', a:'Palmer notation, Two digit/FDI, Universal/American.' },
{ cat:"introduction", lec:"intro", q:'Without hints — list the 3 stages of dentition with age ranges.', a:'Deciduous (6m-6y), Mixed (6y-12y), Permanent (after 12y).' },
{ cat:"introduction", lec:"intro", q:'Without hints — what are the 4 supporting structures of the tooth?', a:'Cementum, PDL, Alveolar process, Gingiva.' },
{ cat:"introduction", lec:"intro", q:'Without hints — name the 5 surfaces of a tooth.', a:'Facial (labial/buccal), Lingual/palatal, Mesial, Distal, Masticatory (incisal edge/occlusal).' },
{ cat:"introduction", lec:"intro", q:'Without hints — what is the eruption sequence for upper permanent teeth?', a:'6 → 1 → 2 → 4 → 5 → 3 → 7 → 8.' },
{ cat:"introduction", lec:"intro", q:'Without hints — what is the eruption sequence for lower permanent teeth?', a:'6 → 1 → 2 → 3 → 4 → 5 → 7 → 8.' },
{ cat:"introduction", lec:"intro", q:'Without hints — name the 4 Wein classification types and their canals/foramina.', a:'Type 1: 1 orifice/1 canal/1 foramen; Type 2: 2/2/1; Type 3: 2/2/2; Type 4: 1/1/2.' },
{ cat:"introduction", lec:"intro", q:'Without hints — list all root types and which teeth have them.', a:'Single root: all incisors, canines, all premolars except upper 4. Double: lower molars + upper 4. Triple: all upper molars.' },
{ cat:"introduction", lec:"intro", q:'What is the difference between deciduous and permanent teeth by number?', a:'Deciduous = 20 teeth; Permanent = 32 teeth.' },
{ cat:"introduction", lec:"intro", q:'What is the difference between deciduous and permanent teeth by tooth types?', a:'Deciduous = no premolars (only A,B,C,D,E per quadrant); Permanent = includes premolars (1-8 per quadrant).' },
{ cat:"introduction", lec:"intro", q:'What is the difference between a cusp and a tubercle?', a:'Cusp = pyramidal elevation made of enamel+dentin+pulp horn on posterior teeth and canine. Tubercle = small rounded extra enamel-only elevation on lingual of upper 6 and upper E.' },
{ cat:"introduction", lec:"intro", q:'What is the difference between cingulum and mamelon?', a:'Cingulum = rounded elevation on cervical lingual of anterior teeth. Mamelon = 3 small rounded elevations on incisal edge of newly erupted incisors only.' },
{ cat:"introduction", lec:"intro", q:'What is the difference between a fossa and a sulcus?', a:'Fossa = irregular rounded depression/concavity. Sulcus = broad depression on occlusal surface between cusp inclines.' },
{ cat:"introduction", lec:"intro", q:'What is the difference between a groove and a fissure?', a:'Groove = linear depression on surface. Fissure = linear depression at the BOTTOM of a groove, from incomplete fusion.' },
{ cat:"introduction", lec:"intro", q:'What is the difference between anatomical crown and clinical crown?', a:'Anatomical crown = covered by enamel (fixed). Clinical crown = visible in oral cavity (changes with gum level).' },
{ cat:"introduction", lec:"intro", q:'What is the difference between a crypt and a socket?', a:'Crypt = bony space with un-erupted tooth. Socket = bony space with root of erupted tooth.' },
{ cat:"introduction", lec:"intro", q:'What is the difference between eruption and shedding?', a:'Eruption = movement of tooth from bone to functional position. Shedding = physiological loss of deciduous teeth due to root resorption.' },
{ cat:"introduction", lec:"intro", q:'What is the difference between bifurcation and trifurcation?', a:'Bifurcation = root trunk divides into 2 roots (lower molars). Trifurcation = root trunk divides into 3 roots (upper molars).' },
{ cat:"introduction", lec:"intro", q:'What is the difference between a true pit and a fault pit?', a:'True pit = at bottom of central or triangular fossa on occlusal surface. Fault pit = at the END of developmental groove on buccal surface of molars.' },
{ cat:"introduction", lec:"intro", q:'What is the difference between the Palmer and FDI systems?', a:'Palmer = uses bracket symbol with numbers/letters and no quadrant number digit. FDI = uses two digits (first = quadrant, second = tooth position).' },
{ cat:"introduction", lec:"intro", q:'What is the difference between permanent successor and permanent (non-successor) teeth?', a:'Successor = replaces a deciduous tooth (teeth 1-5). Non-successor = no deciduous predecessor (molars 6, 7, 8).' },
/* ── INCISORS & CANINES ── */
{ cat:"inc-general",    lec:"inc-can", q:'How many maxillary incisors are there in total?', a:'Four (2 central + 2 lateral).' },
{ cat:"inc-general",    lec:"inc-can", q:'How many mandibular incisors are there in total?', a:'Four (2 central + 2 lateral).' },
{ cat:"inc-general",    lec:"inc-can", q:'Where are central incisors located in the arch?', a:'On either side at the midline, with mesial surfaces in contact with each other.' },
{ cat:"inc-general",    lec:"inc-can", q:'What surface of the central incisor contacts the lateral incisor?', a:'The distal surface of the central incisor contacts the mesial surface of the lateral incisor.' },
{ cat:"inc-general",    lec:"inc-can", q:'What is located distal to each lateral incisor?', a:'The canine.' },
{ cat:"inc-general",    lec:"inc-can", q:'What surface of the lateral incisor contacts the canine?', a:'The distal surface.' },
{ cat:"inc-functions",  lec:"inc-can", q:'What are the four functions of incisors?', a:'(a) Cut food, (b) speech, (c) support the lip and maintain esthetic appearance, (d) guide mandible posteriorly during final closing phase.' },
{ cat:"inc-functions",  lec:"inc-can", q:'Which incisors act as moving blades during cutting?', a:'Mandibular incisors (moving against the maxillary incisors).' },
{ cat:"inc-functions",  lec:"inc-can", q:'How do incisors help with mandibular guidance?', a:'They guide the mandible posteriorly during the final phase of closing, just before the posterior teeth contact.' },
{ cat:"inc-morphology", lec:"inc-can", q:'What are the two aspects considered when studying tooth morphology?', a:'Shape (outline) and contours (ridges and grooves) on each surface.' },
{ cat:"inc-morphology", lec:"inc-can", q:'How many surfaces does every tooth crown have?', a:'Five – labial, lingual, mesial, distal, and occlusal/incisal.' },
{ cat:"inc-morphology", lec:"inc-can", q:'How many developmental lobes do all anterior teeth have on the labial side?', a:'Three labial lobes: mesial, middle, and distal.' },
{ cat:"inc-morphology", lec:"inc-can", q:'What separates the three labial lobes on the facial surface of incisors?', a:'Two shallow vertical developmental depressions.' },
{ cat:"inc-morphology", lec:"inc-can", q:'What are mamelons?', a:'Three rounded elevations on the incisal edge of newly erupted incisor teeth, contributed by the three labial lobes.' },
{ cat:"inc-morphology", lec:"inc-can", q:'What is the cingulum?', a:'A lingual bulge formed by the fourth (lingual) lobe.' },
{ cat:"inc-morphology", lec:"inc-can", q:'How many total lobes do all incisors have?', a:'Four (3 facial + 1 lingual/cingulum).' },
{ cat:"inc-morphology", lec:"inc-can", q:'Do all four types of incisors have a cingulum?', a:'Yes – maxillary central, maxillary lateral, mandibular central, and mandibular lateral all have a cingulum.' },
{ cat:"inc-morphology", lec:"inc-can", q:'What is the geometric outline of all incisor crowns from the facial view?', a:'Rectangular (trapezoid) – longer incisogingivally than wide mesiodistally.' },
{ cat:"inc-morphology", lec:"inc-can", q:'In which direction do incisor crowns taper from the facial view?', a:'From the widest mesiodistal area of proximal contact toward the cervical line (narrowing cervically).' },
{ cat:"inc-morphology", lec:"inc-can", q:'How do incisor roots taper from the labial view?', a:'They become narrower from the cervical line to the apex.' },
{ cat:"inc-morphology", lec:"inc-can", q:'Describe the incisal edge of all incisors from the facial view.', a:'Relatively straight or slightly curved.' },
{ cat:"inc-morphology", lec:"inc-can", q:'Why is the lingual surface of incisors narrower than the labial surface?', a:'Because the mesial and distal surfaces converge lingually.' },
{ cat:"inc-morphology", lec:"inc-can", q:'What is the geometric outline of incisors from the proximal view?', a:'Wedge-shaped (triangular).' },
{ cat:"inc-morphology", lec:"inc-can", q:'Where is the labial height of contour on incisors from the proximal view?', a:'In the cervical third.' },
{ cat:"inc-morphology", lec:"inc-can", q:'Describe the lingual outline of incisors from the proximal view.', a:'S-shaped – convex over the cingulum and concave from the cingulum nearly to the incisal edge.' },
{ cat:"inc-morphology", lec:"inc-can", q:'How does the cervical line curve on the proximal surface of incisors?', a:'It curves toward the incisal edge (concave rootwise).' },
{ cat:"inc-morphology", lec:"inc-can", q:'On which surface is the cervical line curvature greater – mesial or distal?', a:'Mesial surface has greater curvature.' },
{ cat:"inc-morphology", lec:"inc-can", q:'Where are incisor roots widest from the proximal view?', a:'In the cervical third, then gradually tapering to the apex.' },
{ cat:"inc-morphology", lec:"inc-can", q:'Where does the incisal ridge terminate from the incisal view?', a:'Mesiodistally at the widest portion of the crown.' },
{ cat:"inc-morphology", lec:"inc-can", q:'Compare the labial and lingual outlines of incisors from the incisal view.', a:'Labial outline is broader and less curved; lingual outline is more convex.' },
{ cat:"inc-morphology", lec:"inc-can", q:'What direction do marginal ridges converge toward from the incisal view?', a:'Toward the cingulum.' },
{ cat:"inc-morphology", lec:"inc-can", q:'How does the crown outline appear from the incisal view?', a:'It tapers from the proximal contact area toward the cingulum.' },
{ cat:"max-incisors",   lec:"inc-can", q:'Which incisor has the widest crown of all incisors?', a:'Maxillary central incisor.' },
{ cat:"max-incisors",   lec:"inc-can", q:'In the maxillary central incisor, how does crown length compare to width?', a:'Crown is usually longer (incisogingivally) than wide (mesiodistally).' },
{ cat:"max-incisors",   lec:"inc-can", q:'Where is the maxillary central incisor crown narrowest?', a:'In the cervical third (becomes broader toward the incisal third).' },
{ cat:"max-incisors",   lec:"inc-can", q:'How does the maxillary lateral incisor compare in width to the central incisor?', a:'It is narrower mesiodistally than the maxillary central incisor.' },
{ cat:"max-incisors",   lec:"inc-can", q:'How does the root of the maxillary lateral incisor compare to the central?', a:'The root of the lateral incisor is longer.' },
{ cat:"max-incisors",   lec:"inc-can", q:'Is the crown outline of the maxillary lateral incisor symmetrical?', a:'No – it is less symmetrical than the central incisor.' },
{ cat:"max-incisors",   lec:"inc-can", q:'Compare the labial surface convexity of maxillary central vs. lateral incisor.', a:'The lateral incisor\'s labial surface is more convex (less flat) than the central incisor.' },
{ cat:"max-incisors",   lec:"inc-can", q:'How do mamelons and labial depressions compare between maxillary central and lateral?', a:'They are less prominent on the lateral incisor.' },
{ cat:"max-incisors",   lec:"inc-can", q:'Describe the mesioincisal line angle of the maxillary central incisor.', a:'Nearly a right angle (straight).' },
{ cat:"max-incisors",   lec:"inc-can", q:'Describe the distoincisal line angle of the maxillary central incisor.', a:'Greater than a right angle (rounded).' },
{ cat:"max-incisors",   lec:"inc-can", q:'How are the mesioincisal and distoincisal line angles of the maxillary lateral incisor compared to the central?', a:'Both are more rounded than on the central incisor.' },
{ cat:"max-incisors",   lec:"inc-can", q:'Which angle is more acute on the maxillary lateral incisor – mesioincisal or distoincisal?', a:'The mesioincisal angle is more acute than the distoincisal angle.' },
{ cat:"max-incisors",   lec:"inc-can", q:'Where is the mesial contact area of both maxillary central and lateral incisors?', a:'In the incisal third.' },
{ cat:"max-incisors",   lec:"inc-can", q:'Are the distal contacts of maxillary incisors more cervical or incisal than the mesial contacts?', a:'More cervical.' },
{ cat:"max-incisors",   lec:"inc-can", q:'Where is the distal contact of the maxillary central incisor?', a:'At the junction of the incisal and middle third.' },
{ cat:"max-incisors",   lec:"inc-can", q:'Where is the distal contact of the maxillary lateral incisor?', a:'In the middle third.' },
{ cat:"max-incisors",   lec:"inc-can", q:'Describe the root shape of the maxillary central incisor.', a:'Conical – thick at the cervical, narrows through the middle to a blunt apex.' },
{ cat:"max-incisors",   lec:"inc-can", q:'Describe the root shape of the maxillary lateral incisor.', a:'Tapers toward a round apex; often bent distally.' },
{ cat:"max-incisors",   lec:"inc-can", q:'Where are the lingual fossae of maxillary incisors located?', a:'Immediately incisal to the cingulum, bounded by two marginal ridges.' },
{ cat:"max-incisors",   lec:"inc-can", q:'Compare the lingual fossa of the maxillary lateral vs. central incisor.', a:'The lateral incisor\'s lingual fossa is smaller in area and more pronounced than the central.' },
{ cat:"max-incisors",   lec:"inc-can", q:'Where is the cingulum located on the maxillary central incisor?', a:'Usually well developed, located off-center, distal to the root axis line.' },
{ cat:"max-incisors",   lec:"inc-can", q:'Where is the cingulum located on the maxillary lateral incisor?', a:'Narrower than the central\'s cingulum; centered on the root axis line.' },
{ cat:"max-incisors",   lec:"inc-can", q:'How do mesial and distal marginal ridges compare on maxillary incisors?', a:'Mesial marginal ridges are longer than distal marginal ridges (on both central and lateral).' },
{ cat:"max-incisors",   lec:"inc-can", q:'Where is the incisal edge of maxillary incisors from the proximal view?', a:'Commonly just labial to the root axis line, or may be on the root axis line.' },
{ cat:"max-incisors",   lec:"inc-can", q:'Which surface of maxillary incisors has greater cervical line curvature – mesial or distal?', a:'Mesial surface has greater curvature.' },
{ cat:"max-incisors",   lec:"inc-can", q:'Which incisor has less cervical line curvature – central or lateral?', a:'Maxillary lateral incisor has less curvature than the central.' },
{ cat:"max-incisors",   lec:"inc-can", q:'Describe the labial height of contour on maxillary incisors from the proximal view.', a:'In the cervical third; becomes nearly flat in the middle and incisal thirds.' },
{ cat:"max-incisors",   lec:"inc-can", q:'Where is the lingual height of contour on maxillary incisors?', a:'In the cervical third, on the cingulum.' },
{ cat:"max-incisors",   lec:"inc-can", q:'How does the root of the maxillary central incisor appear from the proximal view?', a:'Wide faciolingually at the cervix; tapers to a rounded apex.' },
{ cat:"max-incisors",   lec:"inc-can", q:'Describe the distal root surface of maxillary incisors.', a:'Convex on both types of maxillary incisors.' },
{ cat:"max-incisors",   lec:"inc-can", q:'What may appear on the mesial root surface of maxillary incisors?', a:'A longitudinal slight depression in the middle third.' },
{ cat:"max-incisors",   lec:"inc-can", q:'Compare mesiodistal vs. labiolingual dimensions of the maxillary central incisor from the incisal view.', a:'Wider mesiodistally than labiolingually.' },
{ cat:"max-incisors",   lec:"inc-can", q:'What is the incisal outline shape of the maxillary central incisor?', a:'Triangular – labial outline forms the broad base, sides converge toward the cingulum.' },
{ cat:"max-incisors",   lec:"inc-can", q:'Where is the cingulum of the maxillary central incisor from the incisal view?', a:'Off-center to the distal.' },
{ cat:"max-incisors",   lec:"inc-can", q:'What is the incisal outline shape of the maxillary lateral incisor?', a:'More rounded or oval.' },
{ cat:"mand-incisors",  lec:"inc-can", q:'Which crown is the narrowest in the entire mouth?', a:'Mandibular central incisor.' },
{ cat:"mand-incisors",  lec:"inc-can", q:'How does the mandibular central incisor compare in size to the lateral?', a:'It is smaller in all dimensions than the mandibular lateral incisor.' },
{ cat:"mand-incisors",  lec:"inc-can", q:'What makes the mandibular central incisor difficult to distinguish left from right?', a:'It is so symmetrical (bilaterally symmetrical).' },
{ cat:"mand-incisors",  lec:"inc-can", q:'How does the mandibular lateral incisor compare in size to the central?', a:'It is a little larger in all dimensions and slightly wider.' },
{ cat:"mand-incisors",  lec:"inc-can", q:'Is the mandibular lateral incisor bilaterally symmetrical?', a:'No – it is not as bilaterally symmetrical as the central.' },
{ cat:"mand-incisors",  lec:"inc-can", q:'Describe the appearance of the mandibular lateral incisor crown on its root.', a:'The crown tilts distally on the root, giving the impression that the tooth has been bent at the cervix.' },
{ cat:"mand-incisors",  lec:"inc-can", q:'Describe the labial surface of both mandibular incisors.', a:'Most often smooth, with two shallow developmental depressions in the incisal third.' },
{ cat:"mand-incisors",  lec:"inc-can", q:'Describe the line angles of the mandibular central incisor.', a:'Both mesioincisal and distoincisal line angles form nearly right angles (due to bilateral symmetry).' },
{ cat:"mand-incisors",  lec:"inc-can", q:'Describe the distoincisal line angle of the mandibular lateral incisor.', a:'Noticeably more rounded than the mesioincisal line angle.' },
{ cat:"mand-incisors",  lec:"inc-can", q:'How does the distal crown outline compare to the mesial on the mandibular lateral incisor?', a:'The curved distal outline (from proximal contact to cervical line) is shorter than the straighter mesial outline.' },
{ cat:"mand-incisors",  lec:"inc-can", q:'Where are the mesial and distal contact areas of the mandibular central incisor?', a:'At the same level, in the incisal third.' },
{ cat:"mand-incisors",  lec:"inc-can", q:'Where are the mesial and distal contact areas of the mandibular lateral incisor?', a:'Not at the same level, but both are still in the incisal third.' },
{ cat:"mand-incisors",  lec:"inc-can", q:'How do the roots of both mandibular incisors appear mesiodistally?', a:'Very narrow mesiodistally.' },
{ cat:"mand-incisors",  lec:"inc-can", q:'Describe the taper of mandibular incisor roots.', a:'Uniform taper on both sides from the cervical line to the apex.' },
{ cat:"mand-incisors",  lec:"inc-can", q:'In which direction may the apex of mandibular incisor roots curve?', a:'Slightly to the distal.' },
{ cat:"mand-incisors",  lec:"inc-can", q:'Describe the lingual fossa of both mandibular incisors.', a:'Barely visible, smooth (no grooves, ridges, or pits), shallow – only slightly concave in the middle and incisal thirds.' },
{ cat:"mand-incisors",  lec:"inc-can", q:'Where is the cingulum on the mandibular central incisor?', a:'Convex, small, and centered on the root axis line.' },
{ cat:"mand-incisors",  lec:"inc-can", q:'Where is the cingulum on the mandibular lateral incisor?', a:'Slightly distal to the root axis line.' },
{ cat:"mand-incisors",  lec:"inc-can", q:'Compare marginal ridge prominence between maxillary and mandibular incisors.', a:'Marginal ridges are more prominent on maxillary incisors than mandibular incisors.' },
{ cat:"mand-incisors",  lec:"inc-can", q:'On mandibular incisors, which marginal ridge is longer – mesial or distal?', a:'Mesial marginal ridges are longer than distal marginal ridges (same as maxillary).' },
{ cat:"mand-incisors",  lec:"inc-can", q:'Describe the roots of mandibular incisors from the lingual view.', a:'Mostly convex and slightly narrower on the lingual side than on the labial side.' },
{ cat:"mand-incisors",  lec:"inc-can", q:'Where is the incisal edge of mandibular incisors from the proximal view?', a:'On or lingual to the mid-root axis.' },
{ cat:"mand-incisors",  lec:"inc-can", q:'On which surface of mandibular incisors is the cervical line curvature greater?', a:'Mesial surface (extends incisally over one fourth of the short crown length).' },
{ cat:"mand-incisors",  lec:"inc-can", q:'Where is the labial height of contour on mandibular incisors from the proximal view?', a:'In the cervical third; becomes flat in the incisal third.' },
{ cat:"mand-incisors",  lec:"inc-can", q:'Describe the lingual outline of mandibular incisors from the proximal view.', a:'S-shaped; height of contour in the cervical third, on the cingulum.' },
{ cat:"mand-incisors",  lec:"inc-can", q:'Describe the roots of mandibular incisors from the proximal view.', a:'Nearly straight labially and lingually from cervical line to middle third; apex on the axis line; slight longitudinal depression on mesial and distal root surfaces at the middle third.' },
{ cat:"mand-incisors",  lec:"inc-can", q:'How do the crown dimensions of mandibular incisors compare (labiolingual vs. mesiodistal)?', a:'Wider labiolingually than mesiodistally.' },
{ cat:"mand-incisors",  lec:"inc-can", q:'Describe the symmetry of the mandibular central incisor from the incisal view.', a:'Practically bilaterally symmetrical; labial and lingual heights of contour are centered.' },
{ cat:"mand-incisors",  lec:"inc-can", q:'Where is the cingulum of the mandibular lateral incisor from the incisal view?', a:'Distal to the mesiodistal midline (not bilaterally symmetrical).' },
{ cat:"canine-general", lec:"inc-can", q:'How many canines are there in total?', a:'Four (one on either side in each arch).' },
{ cat:"canine-general", lec:"inc-can", q:'Which teeth are the longest of all permanent teeth?', a:'Canines.' },
{ cat:"canine-general", lec:"inc-can", q:'The canines are the ___ teeth from the midline.', a:'Third.' },
{ cat:"canine-general", lec:"inc-can", q:'What surfaces are in contact with the canine?', a:'Mesially – distal surface of lateral incisor; distally – mesial surface of the first premolar.' },
{ cat:"canine-general", lec:"inc-can", q:'What are the four functions of canines?', a:'(a) Support lip and facial muscles, (b) cut/pierce/shear food, (c) protective mechanism during lateral mandibular movement (separates posterior teeth), (d) good anchor teeth due to long root.' },
{ cat:"canine-general", lec:"inc-can", q:'What happens to the posterior teeth when the mandible moves laterally and the canine guides it?', a:'All posterior teeth separate.' },
{ cat:"canine-general", lec:"inc-can", q:'Why are canines considered good anchor teeth?', a:'Because of their large, long roots.' },
{ cat:"canine-chars",   lec:"inc-can", q:'What geometric shape do canine crowns resemble from the facial view?', a:'Pentagon (five sides).' },
{ cat:"canine-chars",   lec:"inc-can", q:'How is the incisal ridge of a canine divided?', a:'Into two inclines: mesial cusp ridge and distal cusp ridge.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Which cusp ridge is shorter on a canine – mesial or distal?', a:'The mesial cusp ridge is shorter than the distal cusp ridge.' },
{ cat:"canine-chars",   lec:"inc-can", q:'What is unique about the labial surface of canines?', a:'It is prominently convex with a vertical labial ridge.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Are canines the only teeth with labial ridges?', a:'Yes – though premolars have a similar-looking ridge called a buccal ridge.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Compare mesiodistal vs. labiolingual crown dimensions of canines.', a:'Crown is greater labiolingually than mesiodistally.' },
{ cat:"canine-chars",   lec:"inc-can", q:'How do root cervix measurements compare on canines?', a:'Even greater faciolingually than mesiodistally.' },
{ cat:"canine-chars",   lec:"inc-can", q:'From how many labial lobes is the facial surface of any canine crown formed?', a:'Three labial lobes.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Which labial lobe forms the labial ridge of the canine?', a:'The middle lobe.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Compare the labial ridge of maxillary vs. mandibular canines.', a:'Maxillary canine has a quite prominent labial ridge; mandibular canine has a more smooth and convex labial surface.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Describe the mesial outline of the maxillary canine.', a:'Broadly convex in the middle, becoming nearly flat in the cervical third.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Describe the distal outline of the maxillary canine.', a:'Forms a shallow S-shape – convex in the middle third and slightly concave in the cervical third.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Describe the mesial outline of the mandibular canine.', a:'Almost flat to slightly convex, nearly in line with the mesial side of the root.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Describe the distal outline of the mandibular canine.', a:'Slightly concave in the cervical third; convex in the incisal two thirds.' },
{ cat:"canine-chars",   lec:"inc-can", q:'How does the crown placement relate to the root axis line on the mandibular canine?', a:'There is noticeably more crown distal to the root axis line than mesial to it (similar to mandibular lateral incisor).' },
{ cat:"canine-chars",   lec:"inc-can", q:'Where is the mesial contact area of the maxillary canine?', a:'At the junction of the incisal and middle third.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Where is the distal contact area of the maxillary canine?', a:'In the middle third.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Where is the mesial contact area of the mandibular canine?', a:'In the incisal third.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Where is the distal contact area of the mandibular canine?', a:'At the junction of the middle and incisal third.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Describe the root of the maxillary canine.', a:'Long, slender, and conical; apical third is narrow mesiodistally; apex may be pointed or sharp; apical third often bends distally.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Describe the root of the mandibular canine.', a:'Tapers apically to a somewhat more blunt apex; apical end is more often straight; shorter than maxillary canine roots.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Describe the lingual ridge of the maxillary canine.', a:'Prominent, running cervicoincisally from the cusp to the cingulum.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Describe the lingual fossae of the maxillary canine.', a:'Mesial and distal lingual fossae lie on either side of the lingual ridge and are usually shallow.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Describe the lingual features of the mandibular canine.', a:'Lingual ridge and fossa are normally less prominent than the maxillary canine.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Describe the cingulum of the maxillary canine.', a:'Large; cusp tip and cingulum are usually centered.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Describe the cingulum of the mandibular canine.', a:'Less bulky and less prominent; lies just distal to the root axis line.' },
{ cat:"canine-chars",   lec:"inc-can", q:'On the maxillary canine, which marginal ridge is less prominent?', a:'The mesial marginal ridge (less prominent than the distal and lingual marginal ridges).' },
{ cat:"canine-chars",   lec:"inc-can", q:'On the maxillary canine, which marginal ridge is longer?', a:'The mesial marginal ridge is longer than the distal.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Describe the marginal ridges of the mandibular canine.', a:'Less prominent; mesial marginal ridge is longer and straighter than the distal.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Where is the incisal ridge of the maxillary canine from the proximal view?', a:'Labial to the mid-root axis line.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Where is the incisal ridge of the mandibular canine from the proximal view?', a:'Lingual to the mid-root axis line.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Compare the cervical line curvature of maxillary vs. mandibular canines.', a:'The mandibular canine cervical line curves more incisally than the maxillary canine\'s.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Why does the mandibular canine cervical line curve more?', a:'Because the mandibular canine crown is narrower faciolingually than the maxillary canine.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Where is the labial height of contour on canines from the proximal view?', a:'In the cervical third of the crown.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Where is the lingual height of contour on canines from the proximal view?', a:'In the cervical third (at the cingulum).' },
{ cat:"canine-chars",   lec:"inc-can", q:'Describe the root surfaces of canines from the proximal view.', a:'Both maxillary and mandibular canines most often have vertical longitudinal depressions on mesial and distal root surfaces; distal depressions are usually deeper.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Is the maxillary canine crown outline symmetrical from the incisal view?', a:'No – it is not symmetrical.' },
{ cat:"canine-chars",   lec:"inc-can", q:'Compare faciolingual vs. mesiodistal dimensions of canine crowns from the incisal view.', a:'Faciolingual dimension is greater than mesiodistal dimension.' },
{ cat:"comparison",     lec:"inc-can", q:'What is the key difference between the cingulum position on maxillary central vs. lateral incisor?', a:'Central – off-center to the distal; Lateral – centered on the root axis line.' },
{ cat:"comparison",     lec:"inc-can", q:'What is the key difference between the incisal edge position of maxillary vs. mandibular incisors?', a:'Maxillary – labial to (or on) root axis line; Mandibular – on or lingual to the root axis line.' },
{ cat:"comparison",     lec:"inc-can", q:'Compare the lingual fossae of maxillary vs. mandibular incisors.', a:'Maxillary – large, pronounced; Mandibular – barely visible, smooth, shallow.' },
{ cat:"comparison",     lec:"inc-can", q:'Compare the crown symmetry of mandibular central vs. lateral incisor.', a:'Central is symmetrical (hard to tell left from right); lateral is not symmetrical.' },
{ cat:"comparison",     lec:"inc-can", q:'What is the key difference between the maxillary and mandibular canine incisal ridge position from the proximal view?', a:'Maxillary – labial to the mid-root axis; Mandibular – lingual to the mid-root axis.' },
{ cat:"comparison",     lec:"inc-can", q:'What is the difference in cusp ridge length on canines?', a:'Mesial cusp ridge is shorter than the distal cusp ridge.' },
{ cat:"comparison",     lec:"inc-can", q:'Compare lingual ridge prominence between maxillary and mandibular canines.', a:'Maxillary canine has a prominent lingual ridge; mandibular canine has a less prominent lingual ridge and fossa.' },
{ cat:"comparison",     lec:"inc-can", q:'Compare contact area locations of maxillary vs. mandibular canines (mesial contact).', a:'Maxillary mesial contact – junction of incisal and middle third; Mandibular mesial contact – incisal third.' },
{ cat:"comparison",     lec:"inc-can", q:'How do canine roots differ between maxillary and mandibular?', a:'Maxillary – long, slender, conical with often distally bent apex; Mandibular – shorter, more blunt and straight apex.' },
{ cat:"comparison",     lec:"inc-can", q:'Name the four functions of incisors (active recall).', a:'Cut food, speech, lip support and esthetics, posterior mandibular guidance.' },
{ cat:"comparison",     lec:"inc-can", q:'Name the four functions of canines (active recall).', a:'Lip/facial muscle support, cut/pierce/shear food, lateral guidance (posterior separation), anchor teeth.' },
{ cat:"comparison",     lec:"inc-can", q:'What is the geometric crown shape of incisors from the labial view?', a:'Rectangular (trapezoid).' },
{ cat:"comparison",     lec:"inc-can", q:'What is the geometric crown shape of incisors from the proximal view?', a:'Wedge-shaped (triangular).' },
{ cat:"comparison",     lec:"inc-can", q:'What is the geometric crown shape of canines from the labial view?', a:'Pentagon (five sides).' },
{ cat:"comparison",     lec:"inc-can", q:'Which tooth is the narrowest crown in the mouth?', a:'Mandibular central incisor.' },
{ cat:"comparison",     lec:"inc-can", q:'Which tooth has the widest crown among all incisors?', a:'Maxillary central incisor.' },
{ cat:"comparison",     lec:"inc-can", q:'What is the cingulum formed from?', a:'The fourth (lingual) developmental lobe.' },
{ cat:"comparison",     lec:"inc-can", q:'What are mamelons and where are they found?', a:'Rounded elevations on the incisal edge of newly erupted incisors; three in total.' },

{ cat:"lower4",       lec:"pre-mol", q:'Which premolar is the smallest?', a:'Lower 4 (mandibular first premolar).' },
{ cat:"lower4",       lec:"pre-mol", q:'By how much is the lingual cusp of lower 4 shorter than buccal?', a:'3 mm (lingual = 2/3 of buccal).' },

{ cat:"lower4",       lec:"pre-mol", q:'What is the geometric outline of the buccal surface of lower 4?', a:'Trapezoid (short cervically).' },

{ cat:"lower4",       lec:"pre-mol", q:'What is the characteristic feature of the lingual surface of lower 4?', a:'Mesiolingual developmental groove.' },

{ cat:"lower6",       lec:"pre-mol", q:'How many cusps does lower 6 have?', a:'5 cusps.' },

{ cat:"lower6",       lec:"pre-mol", q:'How many root canals does the distal root of lower 6 have?', a:'1 root canal.' },
{ cat:"lower7",       lec:"pre-mol", q:'How does lower 7 compare in size to lower 6?', a:'Smaller than lower 6.' },
{ cat:"lower7",       lec:"pre-mol", q:'How many cusps does lower 7 have?', a:'4 cusps (2 buccal + 2 lingual).' },

{ cat:"lower7",       lec:"pre-mol", q:'What is the cusp size order in lower 7?', a:'MB (largest) > ML > DL > DB (smallest).' },
{ cat:"lower7",       lec:"pre-mol", q:'How many developmental grooves does lower 7 have?', a:'3 grooves (cross shape): central + buccal + lingual, meet at right angle.' },
{ cat:"lower7",       lec:"pre-mol", q:'What pattern do the grooves of lower 7 form?', a:'Cross (+) shape.' },
{ cat:"lower8",       lec:"pre-mol", q:'What is the size of lower 8 compared to other mandibular molars?', a:'Smallest molar.' },
{ cat:"lower8",       lec:"pre-mol", q:'What makes lower 8 unique among all teeth?', a:'Most variable tooth in all teeth.' },
{ cat:"lower8",       lec:"pre-mol", q:'When does lower 8 erupt?', a:'18–21 years.' },

{ cat:"upper6",       lec:"pre-mol", q:'What is the extra elevation unique to upper 6?', a:'Tubercle of Carabelli (nonfunctional).' },
{ cat:"upper6",       lec:"pre-mol", q:'How many cusps does upper 6 have?', a:'4 main cusps + Tubercle of Carabelli.' },

{ cat:"upper6",       lec:"pre-mol", q:'When does upper 6 erupt?', a:'6–7 years.' },
{ cat:"upper6",       lec:"pre-mol", q:'When is upper 6 root completed?', a:'9–10 years.' },

{ cat:"upper6",       lec:"pre-mol", q:'What is the root trunk length of upper 6 (buccal)?', a:'4 mm from cervical line.' },
