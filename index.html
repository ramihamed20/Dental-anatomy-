{ cat:"dc-fund",    lec:"deciduous", q:'What is another scientific name for primary teeth, and what does it mean?', a:'Deciduous teeth – from Latin meaning "fall off."' },
{ cat:"dc-fund",    lec:"deciduous", q:'List THREE other common names for primary teeth.', a:'Milk teeth / Temporary teeth / Baby teeth.' },
{ cat:"dc-fund",    lec:"deciduous", q:'What is the dentition that follows the primary dentition called?', a:'Permanent dentition (also called secondary dentition or adult dentition).' },
{ cat:"dc-fund",    lec:"deciduous", q:'How many teeth are in the primary dentition formula per quadrant?', a:'5 teeth per quadrant: 2 incisors, 1 canine, 2 molars.' },
{ cat:"dc-fund",    lec:"deciduous", q:'How many teeth are in the secondary dentition formula per quadrant?', a:'8 teeth per quadrant: 2 incisors, 1 canine, 2 premolars, 3 molars.' },
{ cat:"dc-fund",    lec:"deciduous", q:'What is the total number of primary teeth?', a:'20 teeth (5 per quadrant × 4 quadrants).' },
{ cat:"dc-fund",    lec:"deciduous", q:'What is the total number of permanent teeth (excluding third molars)?', a:'28 teeth.' },
{ cat:"dc-fund",    lec:"deciduous", q:'What type of teeth is ABSENT in the primary dentition?', a:'Premolars.' },
{ cat:"dc-fund",    lec:"deciduous", q:'What permanent teeth replace primary molars?', a:'Premolars.' },
{ cat:"dc-fund",    lec:"deciduous", q:'What does "succedaneous" mean in dentistry?', a:'Permanent teeth that succeed (replace) their primary predecessors. There are 20 succedaneous teeth.' },
{ cat:"dc-fund",    lec:"deciduous", q:'Are permanent molars succedaneous teeth? Why?', a:'No – they have no primary predecessors; they erupt distal to the primary second molars.' },
{ cat:"dc-fund",    lec:"deciduous", q:'How many secondary molars are NOT succedaneous?', a:'12 secondary molars (3 molars × 4 quadrants).' },
{ cat:"dc-fund",    lec:"deciduous", q:'Name the THREE numbering systems used for primary dentition.', a:'Palmer system (one digit), Federation system (two digit), Universal system.' },
{ cat:"dc-func",    lec:"deciduous", q:'Until what age are primary teeth the ONLY teeth children have?', a:'Until the sixth birthday (age 6).' },
{ cat:"dc-func",    lec:"deciduous", q:'Until what age do remaining primary teeth still function?', a:'Until age 12.' },
{ cat:"dc-func",    lec:"deciduous", q:'List the FOUR main functions of primary teeth.', a:'1. Efficient chewing (mastication) of food. 2. Support for cheeks and lips – maintaining normal facial appearance and smile. 3. Speech. 4. Maintaining space for eruption of permanent teeth.' },
{ cat:"dc-func",    lec:"deciduous", q:'Why are primary teeth critical for space maintenance?', a:'They reserve the arch space needed for permanent teeth to erupt properly.' },
{ cat:"dc-func",    lec:"deciduous", q:'What role do primary teeth play in facial appearance?', a:'They provide support for cheeks and lips, maintaining normal facial appearance and smile.' },
{ cat:"dc-premature",lec:"deciduous", q:'What orthodontic problem can result from premature loss of primary teeth?', a:'Misalignment requiring extensive orthodontic therapy.' },
{ cat:"dc-premature",lec:"deciduous", q:'Why is proper diet and oral hygiene important for primary teeth?', a:'To avoid dental decay that could lead to infection and pain.' },
{ cat:"dc-premature",lec:"deciduous", q:'What is Turner\'s spot?', a:'A discolored spot on a developing secondary tooth, caused by an abscess from infection of the pulp of a primary tooth.' },
{ cat:"dc-premature",lec:"deciduous", q:'What causes Turner\'s spot?', a:'An abscess from pulp infection of a primary tooth.' },
{ cat:"dc-premature",lec:"deciduous", q:'Name THREE problems that can result from premature loss of primary teeth.', a:'1. Alignment problems (need for orthodontic therapy). 2. Dental decay leading to infection and pain. 3. Turner\'s spot on developing secondary tooth.' },
{ cat:"dc-chrono",  lec:"deciduous", q:'What is "eruption of teeth"?', a:'The time of emergence of each type of primary and secondary tooth above the gingiva.' },
{ cat:"dc-chrono",  lec:"deciduous", q:'How much variation (earlier or later) is considered NORMAL for primary tooth eruption?', a:'4–5 months earlier or later.' },
{ cat:"dc-chrono",  lec:"deciduous", q:'How much variation is considered normal for secondary tooth eruption?', a:'12–18 months earlier or later.' },
{ cat:"dc-chrono",  lec:"deciduous", q:'What is the best method to determine an unerupted or missing tooth?', a:'Dental radiograph (X-ray).' },
{ cat:"dc-chrono",  lec:"deciduous", q:'What are the FOUR periods of tooth eruption?', a:'1. No teeth period (birth to 6 months). 2. Primary dentition only (6 months to 6 years). 3. Mixed dentition (6 to 12 years). 4. Secondary dentition only (after 12 years).' },
{ cat:"dc-chrono",  lec:"deciduous", q:'Describe the "No teeth period."', a:'From birth to 6 months – no teeth visible in the mouth.' },
{ cat:"dc-chrono",  lec:"deciduous", q:'When do all primary teeth finish erupting into the mouth?', a:'Between 6 months and 2 years old.' },
{ cat:"dc-chrono",  lec:"deciduous", q:'Between what ages are all 20 primary teeth present with NO permanent teeth visible?', a:'2 to 6 years old.' },
{ cat:"dc-chrono",  lec:"deciduous", q:'At what age do permanent teeth FIRST start to appear?', a:'Age 6.' },
{ cat:"dc-chrono",  lec:"deciduous", q:'Which permanent teeth erupt FIRST at age 6?', a:'The permanent first molars (just distal to the primary second molars), followed by the permanent mandibular central incisors.' },
{ cat:"dc-chrono",  lec:"deciduous", q:'Which primary teeth are lost first in the mixed dentition?', a:'The primary mandibular central incisors (at age 6).' },
{ cat:"dc-chrono",  lec:"deciduous", q:'During what age range are all 8 permanent incisors replacing primary incisors?', a:'6–9 years old.' },
{ cat:"dc-chrono",  lec:"deciduous", q:'During what age range do permanent canines and premolars replace primary canines and molars?', a:'9–12 years old.' },
{ cat:"dc-chrono",  lec:"deciduous", q:'At what age do second permanent molars emerge?', a:'At 12 years old (distal to the permanent first molars).' },
{ cat:"dc-chrono",  lec:"deciduous", q:'What is the state of dentition after age 12?', a:'All primary teeth exfoliated; 28 permanent teeth present.' },
{ cat:"dc-chrono",  lec:"deciduous", q:'At what age do third molars (wisdom teeth) typically emerge?', a:'17 to 21 years old.' },
{ cat:"dc-develop", lec:"deciduous", q:'What happens to a tooth BEFORE eruption?', a:'Crown forms from lobes and calcifies within the jawbone; after crown calcification, root starts to form and tooth moves toward the oral cavity.' },
{ cat:"dc-develop", lec:"deciduous", q:'What happens to the root AFTER eruption?', a:'Root continues to form until root formation is completed.' },
{ cat:"dc-develop", lec:"deciduous", q:'When do permanent teeth begin forming within the jawbones relative to primary teeth?', a:'While primary teeth are forming and erupting, permanent teeth are already beginning to form within the jawbones.' },
{ cat:"dc-develop", lec:"deciduous", q:'When do ALL primary teeth start to calcify?', a:'Between 4 and 6 months in utero.' },
{ cat:"dc-develop", lec:"deciduous", q:'When is the crown of a primary tooth completed?', a:'Within the first year after birth.' },
{ cat:"dc-develop", lec:"deciduous", q:'How long (on average) does primary tooth calcification take?', a:'An average of 10 months from the beginning of calcification.' },
{ cat:"dc-develop", lec:"deciduous", q:'When does root formation begin in primary and permanent teeth?', a:'Once the enamel (crown) is formed.' },
{ cat:"dc-develop", lec:"deciduous", q:'When does a tooth start its occlusal movement?', a:'At the same time as root formation begins.' },
{ cat:"dc-develop", lec:"deciduous", q:'For how long after eruption does a tooth continue occlusal movement?', a:'About 6 months to 2 years – until it occludes with the opposite teeth.' },
{ cat:"dc-develop", lec:"deciduous", q:'What is the sequence of eruption of primary teeth?', a:'Starts from the mandibular central incisor; the last tooth to erupt is the maxillary second molar.' },
{ cat:"dc-develop", lec:"deciduous", q:'Which primary tooth erupts FIRST?', a:'Mandibular central incisor (at 6 months).' },
{ cat:"dc-develop", lec:"deciduous", q:'Which primary tooth erupts LAST?', a:'Maxillary second molar (at 24 months).' },
{ cat:"dc-develop", lec:"deciduous", q:'What is "primate space"?', a:'Developmental gaps between anterior teeth that occur as the jaws grow. They appear mesial to maxillary canines and distal to mandibular canines.' },
{ cat:"dc-develop", lec:"deciduous", q:'Where does primate space occur in the MAXILLA?', a:'Mesial to the maxillary canines.' },
{ cat:"dc-develop", lec:"deciduous", q:'Where does primate space occur in the MANDIBLE?', a:'Distal to the mandibular canines.' },
{ cat:"dc-develop", lec:"deciduous", q:'When does root completion of primary teeth occur?', a:'From 18 months (1½ years) to 3 years old.' },
{ cat:"dc-develop", lec:"deciduous", q:'What is exfoliation?', a:'The process of shedding – when deciduous teeth fall off due to root resorption caused by underlying succedaneous teeth.' },
{ cat:"dc-develop", lec:"deciduous", q:'What causes primary tooth roots to resorb?', a:'The pressure/movement of the underlying succedaneous (permanent) tooth.' },
{ cat:"dc-sequence",lec:"deciduous", q:'At what month does the mandibular central incisor erupt? What eruption order?', a:'6 months – 1st to erupt.' },
{ cat:"dc-sequence",lec:"deciduous", q:'At what month does the mandibular lateral incisor erupt? Eruption order?', a:'7 months – 2nd to erupt.' },
{ cat:"dc-sequence",lec:"deciduous", q:'At what month does the maxillary central incisor erupt? Eruption order?', a:'7½ months – 3rd to erupt.' },
{ cat:"dc-sequence",lec:"deciduous", q:'At what month does the maxillary lateral incisor erupt? Eruption order?', a:'9 months – 4th to erupt.' },
{ cat:"dc-sequence",lec:"deciduous", q:'At what month does the mandibular first molar erupt? Eruption order?', a:'12 months – 5th to erupt.' },
{ cat:"dc-sequence",lec:"deciduous", q:'At what month does the maxillary first molar erupt? Eruption order?', a:'14 months – 6th to erupt.' },
{ cat:"dc-sequence",lec:"deciduous", q:'At what month does the mandibular canine erupt? Eruption order?', a:'16 months – 7th to erupt.' },
{ cat:"dc-sequence",lec:"deciduous", q:'At what month does the maxillary canine erupt? Eruption order?', a:'18 months – 8th to erupt.' },
{ cat:"dc-sequence",lec:"deciduous", q:'At what month does the mandibular second molar erupt? Eruption order?', a:'20 months – 9th to erupt.' },
{ cat:"dc-sequence",lec:"deciduous", q:'At what month does the maxillary second molar erupt? Eruption order?', a:'24 months – 10th (last) to erupt.' },
{ cat:"dc-mixed",   lec:"deciduous", q:'Define mixed dentition.', a:'When both primary and permanent teeth are visible in the oral cavity.' },
{ cat:"dc-mixed",   lec:"deciduous", q:'What is the age range of mixed dentition?', a:'6 to 12 years old.' },
{ cat:"dc-mixed",   lec:"deciduous", q:'How many teeth are visible in mixed dentition, and what are they?', a:'24 teeth – 20 primary teeth (being replaced by successors) + 4 permanent first molars.' },
{ cat:"dc-mixed",   lec:"deciduous", q:'What is "leeway space"?', a:'The difference in mesiodistal space between primary canines+molars and permanent canines+premolars in each quadrant. Primary molars are wider than premolars, creating extra space.' },
{ cat:"dc-mixed",   lec:"deciduous", q:'Why is leeway space significant?', a:'Because the space left by larger primary molars allows room for permanent canines and premolars to align properly.' },
{ cat:"dc-mixed",   lec:"deciduous", q:'What happens when the permanent first molars erupt at age 6 regarding space?', a:'Their eruption force tends to drift mesially, pushing primary teeth forward. Without counteracting factors, there would be insufficient space for premolars.' },
{ cat:"dc-mixed",   lec:"deciduous", q:'What THREE factors help preserve sufficient space for premolars and permanent canines?', a:'1. Primary molar root flare. 2. Primary molar crown size. 3. Primate space.' },
{ cat:"dc-perm-form",lec:"deciduous", q:'When do permanent tooth crowns START forming?', a:'At birth.' },
{ cat:"dc-perm-form",lec:"deciduous", q:'When does crown calcification of permanent teeth complete?', a:'Until 16 years old (when third molars are completed).' },
{ cat:"dc-perm-form",lec:"deciduous", q:'How many years BEFORE eruption is crown calcification of permanent teeth completed?', a:'About 3–4 years before eruption.' },
{ cat:"dc-perm-order",lec:"deciduous", q:'What age range covers permanent incisor eruption?', a:'6–9 years old.' },
{ cat:"dc-perm-order",lec:"deciduous", q:'What age range covers permanent canine and premolar eruption?', a:'9–12 years old.' },
{ cat:"dc-perm-order",lec:"deciduous", q:'What is the eruption order of MAXILLARY permanent teeth?', a:'1st – First molar (6–7y), 2nd – Central incisor (7–8y), 3rd – Lateral incisor (8–9y), 4th – First premolar (10–11y), 5th – Second premolar (10–12y), 6th – Canine (11–12y), 7th – Second molar (12–15y), 8th – Third molar (17–21y).' },
{ cat:"dc-perm-order",lec:"deciduous", q:'What is the eruption order of MANDIBULAR permanent teeth?', a:'1st – Central incisor & First molar (6–7y), 2nd – Lateral incisor (7–8y), 4th – Canine (9–10y), 5th – First premolar (10–12y), 6th – Second premolar (11–12y), 7th – Second molar (11–13y), 8th – Third molar (17–21y).' },
{ cat:"dc-perm-order",lec:"deciduous", q:'Which permanent tooth erupts FIRST in the mandible?', a:'Central incisor and first molar simultaneously at 6–7 years.' },
{ cat:"dc-perm-order",lec:"deciduous", q:'Which permanent tooth erupts FIRST in the maxilla?', a:'First molar at 6–7 years.' },
{ cat:"dc-diff",    lec:"deciduous", q:'How do primary teeth compare in SIZE to permanent teeth?', a:'Primary teeth are smaller in size.' },
{ cat:"dc-diff",    lec:"deciduous", q:'Where do primary tooth crowns BULGE compared to permanent teeth?', a:'Primary crowns bulge close to the cervical ridges and lingual cingulum.' },
{ cat:"dc-diff",    lec:"deciduous", q:'How do the ROOTS of primary teeth compare to permanent teeth relative to the crown?', a:'Primary teeth have relatively longer roots compared to their crown.' },
{ cat:"dc-diff",    lec:"deciduous", q:'How does MINERALIZATION compare between primary and permanent teeth?', a:'Primary teeth are less mineralized and become very worn.' },
{ cat:"dc-diff",    lec:"deciduous", q:'How does the ENAMEL AND DENTINE layer thickness compare?', a:'Primary teeth have thinner enamel and dentine layers than permanent teeth.' },
{ cat:"dc-diff",    lec:"deciduous", q:'What is the consequence of thinner enamel/dentine in primary teeth?', a:'The pulp cavities are larger (relatively bigger pulp chambers).' },
{ cat:"dc-diff",    lec:"deciduous", q:'How do primary teeth compare in COLOR to permanent teeth?', a:'Primary teeth are whiter in color.' },
{ cat:"dc-diff",    lec:"deciduous", q:'How does SHAPE CONSISTENCY compare between primary and permanent teeth?', a:'Primary teeth have more consistent shapes than permanent teeth.' },
{ cat:"dc-diff",    lec:"deciduous", q:'How do primary molar ROOTS differ from other primary tooth roots?', a:'Primary molar roots are narrow but diverged (flared) and wide apart.' },
{ cat:"dc-anterior",lec:"deciduous", q:'List the characteristic features of primary anterior tooth CROWNS.', a:'Prominent cervical ridges, prominent lingual cingulum, no depressions, mamelons, or perikymata on the labial surface.' },
{ cat:"dc-anterior",lec:"deciduous", q:'What structures are ABSENT on the labial surface of primary anterior crowns?', a:'Depressions, mamelons, and perikymata.' },
{ cat:"dc-anterior",lec:"deciduous", q:'Describe the roots of primary anterior teeth.', a:'Long in proportion to crown length, narrow mesiodistally, and bend labially in their apical third.' },
{ cat:"dc-anterior",lec:"deciduous", q:'In which direction do primary anterior tooth roots bend at the apical third?', a:'Labially (toward the lip).' },
{ cat:"dc-posterior",lec:"deciduous", q:'What is the prominent feature on the BUCCAL surface of primary posterior crowns?', a:'A prominent mesial cervical ridge or bulge on the buccal surface.' },
{ cat:"dc-posterior",lec:"deciduous", q:'Describe the OCCLUSAL TABLE of primary molar crowns.', a:'It is narrow.' },
{ cat:"dc-posterior",lec:"deciduous", q:'How do molar crowns compare in width vs. height?', a:'They are wide mesiodistally relative to their cervico-occlusal height.' },
{ cat:"dc-posterior",lec:"deciduous", q:'Describe the occlusal anatomy of primary molars.', a:'It is shallow with few grooves or depressions.' },
{ cat:"dc-posterior",lec:"deciduous", q:'Which primary molar is larger – first or second?', a:'The primary second molar is decidedly larger than the primary first molar.' },
{ cat:"dc-posterior",lec:"deciduous", q:'Where are the root furcations located on primary molars?', a:'Near the crown (close to the cervical line).' },
{ cat:"dc-posterior",lec:"deciduous", q:'Describe the roots of primary molars.', a:'Thin, slender, and spread out beyond the outline of the crown. More widely spread on second molars than first molars.' },
{ cat:"dc-posterior",lec:"deciduous", q:'Why do primary molar roots spread beyond the crown outline?', a:'The root divergence makes room for the developing succedaneous (permanent) premolar beneath.' },
{ cat:"dc-posterior",lec:"deciduous", q:'What is the clinical danger of extracting a primary molar when its roots are complete but before resorption begins?', a:'The developing portion of the premolar beneath may be accidentally removed along with the primary molar.' },
{ cat:"dc-posterior",lec:"deciduous", q:'How do the roots of primary molars compare to permanent molars in number and size?', a:'They are similar in relative size (before resorption) and number.' },
{ cat:"dc-roots",   lec:"deciduous", q:'In the primary MAXILLARY molar, which root is the longest?', a:'The palatal root.' },
{ cat:"dc-roots",   lec:"deciduous", q:'In the primary maxillary molar, which roots are the shortest?', a:'The mesiobuccal and distobuccal roots.' },
{ cat:"dc-roots",   lec:"deciduous", q:'In the primary MANDIBULAR molar, which root is the largest?', a:'The mesial root.' },
{ cat:"dc-compare", lec:"deciduous", q:'Which permanent tooth is similar in shape, cusps, grooves, ridges, and fossae to the primary maxillary second molar?', a:'The permanent maxillary first molar (larger but similar in form).' },
{ cat:"dc-compare", lec:"deciduous", q:'Which permanent tooth is similar in shape, cusps, grooves, ridges, and fossae to the primary mandibular second molar?', a:'The permanent mandibular first molar (larger but similar in form).' },
{ cat:"dc-compare", lec:"deciduous", q:'What is the key difference between the permanent first molar and the primary second molar it resembles?', a:'The permanent first molar is larger; otherwise the overall shape is similar.' },
{ cat:"dc-recall",  lec:"deciduous", q:'Name the FOUR periods of tooth development and their age ranges.', a:'1. No teeth: birth – 6 months. 2. Primary only: 6 months – 6 years. 3. Mixed: 6 – 12 years. 4. Secondary only: after 12 years.' },
{ cat:"dc-recall",  lec:"deciduous", q:'Why are secondary molars NOT succedaneous teeth?', a:'Because they have no primary predecessors – they erupt distal to primary molars, not in replacement of them.' },
{ cat:"dc-recall",  lec:"deciduous", q:'What happens to primary teeth roots when the permanent successor starts moving?', a:'The roots begin to resorb (resorption) until the primary tooth falls off (exfoliation).' },
{ cat:"dc-recall",  lec:"deciduous", q:'A child is 8 years old. Which dentition period is this?', a:'Mixed dentition period.' },
{ cat:"dc-recall",  lec:"deciduous", q:'A parent asks why their 5-year-old has spaces between their front teeth. What is your explanation?', a:'These are primate spaces – normal developmental gaps that occur as the jaw grows, found mesial to maxillary canines and distal to mandibular canines.' },
{ cat:"dc-recall",  lec:"deciduous", q:'A child\'s primary tooth has not erupted at the expected time. What is the best tool to assess it?', a:'Dental radiograph (X-ray).' },
{ cat:"dc-recall",  lec:"deciduous", q:'Why do primary molar roots flare/diverge so widely?', a:'To create space for the developing premolar tooth bud underneath.' },
{ cat:"dc-recall",  lec:"deciduous", q:'What are the THREE structures that help maintain arch space during mixed dentition?', a:'Primary molar root flare, primary molar crown size, and primate space.' },
{ cat:"dc-recall",  lec:"deciduous", q:'What is the relationship between primary molar size and leeway space?', a:'Primary molars are wider than the premolars that replace them, creating extra leeway space for proper permanent tooth alignment.' },
{ cat:"dc-recall",  lec:"deciduous", q:'From memory: list the eruption sequence of ALL primary teeth with their months.', a:'1. Mand. central incisor – 6 mo. 2. Mand. lateral incisor – 7 mo. 3. Max. central incisor – 7½ mo. 4. Max. lateral incisor – 9 mo. 5. Mand. first molar – 12 mo. 6. Max. first molar – 14 mo. 7. Mand. canine – 16 mo. 8. Max. canine – 18 mo. 9. Mand. second molar – 20 mo. 10. Max. second molar – 24 mo.' },
{ cat:"dc-recall",  lec:"deciduous", q:'What is the difference between "exfoliation" and "resorption"?', a:'Root resorption is the process of root being broken down by the succedaneous tooth. Exfoliation is the final shedding/falling out of the deciduous tooth after resorption is complete.' },
{ cat:"dc-recall",  lec:"deciduous", q:'A primary tooth is lost at age 4. What is the most likely consequence?', a:'Insufficient space for the permanent successor, requiring orthodontic therapy.' },
{ cat:"dc-recall",  lec:"deciduous", q:'What distinguishes primary molars from primary anterior teeth regarding root morphology?', a:'Anterior roots are narrow and bend labially; molar roots are thin, flared/diverged, and spread beyond the crown outline.' },
// ═══════════════════════════════════════════════════════
// OCCLUSION & ARRANGEMENT OF TEETH
// Dr. Moataz Al-Zawaghi | Dental Anatomy | 1st Year
// ═══════════════════════════════════════════════════════
// --- DEFINITION OF OCCLUSION ---
{ cat:"occ-definition", lec:"occlusion", q:'Define occlusion.', a:'Contact of teeth in opposing dental arches when the jaw is closed (centric occlusion) or during various jaw movements (dynamic occlusal relation).' },
{ cat:"occ-definition", lec:"occlusion", q:'What are the two main states in which occlusion is defined?', a:'1. Closed jaw = centric occlusion. 2. During jaw movement = dynamic occlusal relation.' },
{ cat:"occ-definition", lec:"occlusion", q:'What two patterns of condyle movement occur during jaw movement?', a:'1. Bilateral symmetrical movement. 2. Bilateral asymmetrical movement.' },
{ cat:"occ-definition", lec:"occlusion", q:'What are the three types of bilateral SYMMETRICAL condyle movement?', a:'a. Opening and closing (elevation & depression). b. Forward movement (protrusive). c. Backward movement (retrosive).' },
{ cat:"occ-definition", lec:"occlusion", q:'What is the bilateral ASYMMETRICAL condyle movement?', a:'Right and left (lateral) movement.' },
{ cat:"occ-definition", lec:"occlusion", q:'List the four functional occlusal relations presented by mandibular movement.', a:'1. Centric occlusion. 2. Protrusive occlusal relation. 3. Retrosive occlusal relation. 4. Lateral occlusal relation (right and left).' },
// --- IMPORTANCE OF IDEAL OCCLUSION ---
{ cat:"occ-importance", lec:"occlusion", q:'List the four importances of ideal occlusion.', a:'1. Mastication – masticatory forces equally distributed. 2. Good appearance. 3. Promotes good pronunciation. 4. Helps stability of jaw relation.' },
{ cat:"occ-importance", lec:"occlusion", q:'How does ideal occlusion contribute to mastication?', a:'Masticatory forces are equally distributed between teeth during function.' },
{ cat:"occ-importance", lec:"occlusion", q:'What is the role of ideal occlusion in speech?', a:'It promotes good pronunciation of letters during speech.' },
// --- ANGLE\'S CLASSIFICATION ---
{ cat:"occ-angles", lec:"occlusion", q:"What is Angle's classification based on?", a:'The relationship between the maxillary and mandibular FIRST MOLARS in centric occlusion.' },
{ cat:"occ-angles", lec:"occlusion", q:"How many classes exist in Angle's classification?", a:'Three classes (Class 1, 2, 3).' },
{ cat:"occ-angles", lec:"occlusion", q:"Which class does Angle classify as IDEAL occlusion?", a:'Class 1 centric occlusion.' },
{ cat:"occ-angles", lec:"occlusion", q:'Describe CLASS 1 occlusal relation.', a:'The mesiobuccal cusp of the maxillary first molar is in line with the buccal groove of the mandibular first molar. The maxillary first molar is slightly posterior to the mandibular.' },
{ cat:"occ-angles", lec:"occlusion", q:'Describe CLASS 2 occlusal relation.', a:'The buccal groove of the mandibular first molar is POSTERIOR to the mesiobuccal cusp of the maxillary first molar. Patient has deficient chin length (retruded mandible).' },
{ cat:"occ-angles", lec:"occlusion", q:'What facial feature is associated with Class 2 occlusion?', a:'Deficient chin length / retruded mandible.' },
{ cat:"occ-angles", lec:"occlusion", q:'Describe CLASS 3 occlusal relation.', a:'The buccal groove of the mandibular first molar is MORE ANTERIOR than normal to the mesiobuccal cusp of the maxillary first molar. Patient has excessive chin length (protruded mandible).' },
{ cat:"occ-angles", lec:"occlusion", q:'What facial feature is associated with Class 3 occlusion?', a:'Excessive chin length / protruded mandible.' },
{ cat:"occ-angles", lec:"occlusion", q:'Compare Class 2 vs Class 3: where is the mandibular buccal groove?', a:'Class 2 = groove is POSTERIOR to mesiobuccal cusp. Class 3 = groove is ANTERIOR to mesiobuccal cusp.' },
{ cat:"occ-angles", lec:"occlusion", q:'What type of mandible does Class 2 have?', a:'Retruded mandible (small/recessed chin).' },
{ cat:"occ-angles", lec:"occlusion", q:'What type of mandible does Class 3 have?', a:'Protruded mandible (large/prominent chin).' },
// --- KEY OF OCCLUSION ---
{ cat:"occ-key", lec:"occlusion", q:'What is the "Key of Occlusion"?', a:'The intercuspal relationship in centric occlusion, based on the position of maxillary and mandibular first molars.' },
{ cat:"occ-key", lec:"occlusion", q:'Which tooth is considered the KEY OF OCCLUSION?', a:'The permanent MAXILLARY first molar.' },
{ cat:"occ-key", lec:"occlusion", q:'Give five reasons why the maxillary first molar is the key of occlusion.', a:'1. First permanent tooth to erupt (age 6). 2. Largest tooth in the arch. 3. No deciduous predecessor (undisturbed eruption). 4. Position guided by deciduous molars. 5. In maxilla, which is fixed to the skull.' },
{ cat:"occ-key", lec:"occlusion", q:'Why is it significant that the maxillary first molar has NO deciduous predecessor?', a:'Its eruption is not disturbed, making its position reliable as a reference for occlusion.' },
{ cat:"occ-key", lec:"occlusion", q:'Why is the MAXILLARY (not mandibular) first molar preferred as the key of occlusion?', a:'Because it erupts in the maxilla, which is fixed to the skull – providing a stable reference point.' },
{ cat:"occ-key", lec:"occlusion", q:'What two nicknames describe the permanent first molar?', a:'"Key of occlusion" AND "Corner stone."' },
// --- CENTRIC OCCLUSION ---
{ cat:"occ-centric", lec:"occlusion", q:'Define centric occlusion.', a:'The relation of upper and lower teeth when they are in MAXIMUM INTERCUSPATION and the condyles are resting in the most RELAXED POSITION in the mandibular fossa.' },
{ cat:"occ-centric", lec:"occlusion", q:'What is the role of centric occlusion relative to mandibular movement?', a:'It is BOTH the start AND terminal position of all mandibular movement.' },
{ cat:"occ-centric", lec:"occlusion", q:'Where are the condyles positioned in centric occlusion?', a:'In the most relaxed position in the mandibular fossa.' },
// --- RELATIONSHIPS IN CLASS 1 CENTRIC OCCLUSION ---
{ cat:"occ-relations", lec:"occlusion", q:'In Class 1 centric occlusion, how many teeth does each tooth contact in the opposing arch?', a:'Each tooth contacts TWO teeth in the opposing arch.' },
{ cat:"occ-relations", lec:"occlusion", q:'Which two teeth are exceptions to the "contact with two opposing teeth" rule?', a:'1. Maxillary third molar. 2. Mandibular central incisor. (each contacts only ONE opposing tooth)' },
{ cat:"occ-relations", lec:"occlusion", q:'Give two reasons why each tooth contacting two opposing teeth is important.', a:'a. Equal distribution of load over teeth. b. If a tooth is lost, the second antagonist prevents elongation (over-eruption) of the opposing tooth.' },
{ cat:"occ-relations", lec:"occlusion", q:'What is OVERJET?', a:'The HORIZONTAL overlap – the incisal edge of upper anterior teeth is labial to the incisal edge of lower anterior teeth.' },
{ cat:"occ-relations", lec:"occlusion", q:'What causes overjet?', a:'The maxillary arch has a larger parabolic curve than the mandibular arch.' },
{ cat:"occ-relations", lec:"occlusion", q:'What is OVERBITE?', a:'The VERTICAL overlap – the incisal edge of maxillary anterior teeth extends BELOW the incisal edge of mandibular anterior teeth (about the incisal third of the lower incisor).' },
{ cat:"occ-relations", lec:"occlusion", q:'Overbite is specific to which teeth?', a:'Incisors and canines.' },
{ cat:"occ-relations", lec:"occlusion", q:'What is the difference between overjet and overbite?', a:'Overjet = HORIZONTAL overlap (labio-lingual direction). Overbite = VERTICAL overlap (incisal-cervical direction).' },
// --- POSTERIOR TEETH RELATIONSHIP ---
{ cat:"occ-posterior", lec:"occlusion", q:'In centric occlusion, where are the maxillary posterior teeth relative to mandibular?', a:'Slightly BUCCAL to the mandibular posterior teeth.' },
{ cat:"occ-posterior", lec:"occlusion", q:'What happens to the BUCCAL cusps of MAXILLARY teeth in centric occlusion?', a:'They are buccal to mandibular buccal cusps → FREE OF CONTACT (nonfunctional).' },
{ cat:"occ-posterior", lec:"occlusion", q:'What happens to the LINGUAL cusps of MAXILLARY teeth in centric occlusion?', a:'They are in contact with the FOSSA of mandibular teeth → FUNCTIONAL.' },
{ cat:"occ-posterior", lec:"occlusion", q:'What happens to the BUCCAL cusps of MANDIBULAR teeth in centric occlusion?', a:'They are in contact with the FOSSA of maxillary teeth → FUNCTIONAL.' },
{ cat:"occ-posterior", lec:"occlusion", q:'What happens to the LINGUAL cusps of MANDIBULAR teeth in centric occlusion?', a:'They are lingual to maxillary teeth → FREE OF CONTACT (nonfunctional).' },
{ cat:"occ-posterior", lec:"occlusion", q:'Define FUNCTIONAL cusps.', a:'Cusps that are in contact during centric occlusion: Lingual cusps of UPPER teeth and Buccal cusps of LOWER teeth.' },
{ cat:"occ-posterior", lec:"occlusion", q:'Define NONFUNCTIONAL cusps.', a:'Cusps that are free of contact in centric occlusion: Buccal cusps of UPPER teeth and Lingual cusps of LOWER teeth.' },
{ cat:"occ-posterior", lec:"occlusion", q:'Give the memory rule for functional vs nonfunctional cusps.', a:'BULL rule: B (Buccal Lower) = Functional, U (Upper Lingual) = Functional. Opposite = Nonfunctional.' },
// --- MALOCCLUSION ---
{ cat:"occ-maloccl", lec:"occlusion", q:'How many forms of malocclusion are there?', a:'4 forms.' },
{ cat:"occ-maloccl", lec:"occlusion", q:'Define DEEP BITE.', a:'When the incisal edge of upper anterior teeth extends below the cervical third or gingiva of lower anterior teeth (excessive overbite).' },
{ cat:"occ-maloccl", lec:"occlusion", q:'Define ANTERIOR OPEN BITE.', a:'When there is NO incisor contact or incisor overbite.' },
{ cat:"occ-maloccl", lec:"occlusion", q:'What causes anterior open bite?', a:'Thumb sucking, abnormal swallowing, and skeletal deformities.' },
{ cat:"occ-maloccl", lec:"occlusion", q:'Define CROSS BITE.', a:'When mandibular teeth have a BUCCAL (or labial) relation to maxillary teeth (opposite of normal).' },
{ cat:"occ-maloccl", lec:"occlusion", q:'What are the two forms of cross bite?', a:'1. Anterior cross bite – usually associated with Class 3 occlusion with large mandible. 2. Posterior cross bite.' },
{ cat:"occ-maloccl", lec:"occlusion", q:'What occlusal class is anterior cross bite usually associated with?', a:'Class 3 occlusal relation (large/protruded mandible).' },
{ cat:"occ-maloccl", lec:"occlusion", q:'Define CROWDING.', a:'When teeth are out of line of the dental arch due to disproportion between the size of the arch and the size of the teeth.' },
{ cat:"occ-maloccl", lec:"occlusion", q:'What causes crowding?', a:'Disproportion between the size of the dental arch and the size of the teeth.' },
{ cat:"occ-maloccl", lec:"occlusion", q:'From memory – what are the FOUR forms of malocclusion?', a:'1. Deep bite. 2. Anterior open bite. 3. Cross bite. 4. Crowding.' },
// --- PHASES OF DENTAL ARCH FORMATION ---
{ cat:"arr-phases", lec:"occlusion", q:'How many phases of dental arch formation (eruption) are there?', a:'5 phases.' },
{ cat:"arr-phases", lec:"occlusion", q:'Describe Phase 1 (tooth #6) of arch formation.', a:'First permanent MOLARS erupt at age 6. Mandibular first molar erupts BEFORE maxillary. They erupt POSTERIOR to deciduous second molars (E). Called "key of occlusion" and "corner stones."' },
{ cat:"arr-phases", lec:"occlusion", q:'Which permanent molar erupts first in Phase 1 – maxillary or mandibular?', a:'Mandibular first molar erupts FIRST.' },
{ cat:"arr-phases", lec:"occlusion", q:'Describe Phase 2 (teeth #1,2) of arch formation.', a:'Permanent CENTRAL and LATERAL INCISORS erupt anteriorly in place of deciduous incisors, near the midline.' },
{ cat:"arr-phases", lec:"occlusion", q:'Describe Phase 3 (teeth #4,5) of arch formation.', a:'FIRST and SECOND PREMOLARS erupt, taking the place of deciduous first and second molars (D and E).' },
{ cat:"arr-phases", lec:"occlusion", q:'Describe Phase 4 (teeth #3,7) of arch formation.', a:'CANINES (key stones) erupt between lateral incisor and first premolar, closing spaces and completing the arch. Then SECOND MOLARS erupt distal to first molars at 12 years.' },
{ cat:"arr-phases", lec:"occlusion", q:'What is the nickname for the canine in arch formation?', a:'"Key stone" – because it closes the arch spaces.' },
{ cat:"arr-phases", lec:"occlusion", q:'Describe Phase 5 (tooth #8) of arch formation.', a:'Eruption of THIRD MOLARS (wisdom teeth). Not always present.' },
{ cat:"arr-phases", lec:"occlusion", q:'What deciduous teeth are replaced by premolars (teeth 4 and 5)?', a:'Deciduous first and second molars (D and E).' },
{ cat:"arr-phases", lec:"occlusion", q:'Name all FIVE phases of dental arch formation in order.', a:'Phase 1 (6) = First permanent molars. Phase 2 (1,2) = Central and lateral incisors. Phase 3 (4,5) = First and second premolars. Phase 4 (3,7) = Canines + second molars. Phase 5 (8) = Third molars.' },
// --- DENTAL ARCH FORM ---
{ cat:"arr-archform", lec:"occlusion", q:'What shapes can a dental arch take?', a:'U-shaped (parabolic), square, or tapered.' },
{ cat:"arr-archform", lec:"occlusion", q:'Into how many segments is the parabolic dental arch divided?', a:'3 segments: anterior, middle, and posterior.' },
{ cat:"arr-archform", lec:"occlusion", q:'Describe the ANTERIOR segment of the parabolic arch.', a:'Curved line including anterior teeth, ending at the labial ridge of the canine.' },

  document.getElementById('progPct').textContent   = pct+'%';
  renderMini();
}

function prevCard(){ isFlipped=false; document.getElementById('flipBox').classList.remove('flipped'); if(idx>0) idx--; render(); }
function markKnow(){ known.add(idx+'_'+currentCat); nextCard(); }
function markSkip(){ skip.add(idx+'_'+currentCat); nextCard(); }

function shuffleCards(){
  for(let i=active.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [active[i],active[j]]=[active[j],active[i]]; }
  idx=0; isFlipped=false; render();
}
function resetAll(){ known.clear(); skip.clear(); idx=0; isFlipped=false; document.getElementById('flipBox').classList.remove('flipped'); render(); }
function jumpTo(i){ idx=i; isFlipped=false; document.getElementById('flipBox').classList.remove('flipped'); render(); }

function renderMini(){
  const grid = document.getElementById('miniGrid');

    div.onclick = () => jumpTo(i);
    grid.appendChild(div);
  });
}

document.addEventListener('keydown', e => {
  if(e.key==='ArrowRight'||e.key===' '){ e.preventDefault(); isFlipped ? nextCard() : flipCard(); }
  else if(e.key==='ArrowLeft') prevCard();
  else if(e.key==='k') markKnow();
  else if(e.key==='r') markSkip();
});

buildCatButtons();
render();

    fBtn.className = 'tf-btn false-btn';
    fBtn.textContent = '✗ FALSE';
    tBtn.onclick = () => answerTF(true, tBtn, fBtn, q);
    fBtn.onclick = () => answerTF(false, tBtn, fBtn, q);
    div.appendChild(tBtn);
    div.appendChild(fBtn);
    optsEl.appendChild(div);
  } else {
    const labels = ['A','B','C','D'];
    const btns = [];
    q.opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'quiz-opt';
      btn.innerHTML = '<span class="opt-label">' + labels[i] + '</span><span>' + opt + '</span>';
      btn.onclick = () => answerMCQ(i, btns, q);
      optsEl.appendChild(btn);
      btns.push(btn);
    });
  }
}

function answerTF(chosen, tBtn, fBtn, q) {
  if (quizAnswered) return;
  quizAnswered = true;
  const isCorrect = chosen === q.ans;
  if (isCorrect) quizCorrect++;
  tBtn.disabled = true;
  fBtn.disabled = true;
  if (chosen === true) {
    tBtn.classList.add(isCorrect ? 'correct' : 'wrong');
    if (!isCorrect) fBtn.classList.add('correct');
  } else {
    fBtn.classList.add(isCorrect ? 'correct' : 'wrong');
    if (!isCorrect) tBtn.classList.add('correct');
  }
  showExplanation(isCorrect, q.exp);
}

function answerMCQ(chosen, btns, q) {
  if (quizAnswered) return;
  quizAnswered = true;
  const isCorrect = chosen === q.ans;
  if (isCorrect) quizCorrect++;
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === chosen && isCorrect) b.classList.add('correct');
    else if (i === chosen && !isCorrect) b.classList.add('wrong');
    else if (i === q.ans) b.classList.add('show-correct');
  });
  showExplanation(isCorrect, q.exp);
}

function showExplanation(correct, text) {
  const el = document.getElementById('qExplanation');
  el.innerHTML = '<strong>' + (correct ? '✓ Correct!' : '✗ Incorrect') + '</strong> — ' + text;
  el.classList.add('visible');
  const nb = document.getElementById('qNextBtn');
  nb.textContent = quizIndex + 1 < quizDeck.length ? 'Next Question →' : 'See Results';
  nb.classList.add('visible');
  document.getElementById('qScore').textContent = '✓ ' + quizCorrect;
}

function nextQuestion() {
  quizIndex++;
  if (quizIndex >= quizDeck.length) {
    showResult();
  } else {
    renderQuestion();
    document.querySelector('.main').scrollTop = 0;
  }
}

function showResult() {
  document.getElementById('quizActive').style.display = 'none';
  const result = document.getElementById('quizResult');
  result.classList.add('visible');
  const pct = Math.round((quizCorrect / quizDeck.length) * 100);
  document.getElementById('rScore').textContent = pct + '%';
  const wrong = quizDeck.length - quizCorrect;
  document.getElementById('rCorrect').textContent = '✓ ' + quizCorrect + ' Correct';
  document.getElementById('rWrong').textContent = '✗ ' + wrong + ' Wrong';
  let label = '';
  if (pct >= 90) label = 'Excellent! You\'re ready for the exam 🎯';
  else if (pct >= 75) label = 'Good work — review the missed questions 📖';
  else if (pct >= 60) label = 'Keep studying — you\'re getting there 💪';
  else label = 'Review the material and try again 🔁';
  document.getElementById('rLabel').textContent = label;
}

function restartQuiz() {
  document.getElementById('quizResult').classList.remove('visible');
  document.getElementById('quizStart').style.display = 'block';
  document.querySelector('.main').scrollTop = 0;
}

function quizBack() {
  if (quizIndex === 0 && !quizAnswered) {
    exitToMenu();
  } else {
    document.getElementById('confirmCount').textContent = quizAnswered ? quizIndex + 1 : quizIndex;
    document.getElementById('confirmModal').classList.add('open');
  }
}

function exitToMenu() {
  document.getElementById('quizActive').style.display = 'none';
  document.getElementById('quizResult').classList.remove('visible');
  document.getElementById('quizStart').style.display = 'block';
  document.querySelector('.main').scrollTop = 0;
}

function closeConfirmModal() {
  document.getElementById('confirmModal').classList.remove('open');
}

function closeConfirm(e) {
  if (e.target === document.getElementById('confirmModal')) closeConfirmModal();
}

function confirmExit() {
  closeConfirmModal();
  exitToMenu();
}

// ── Theme ──
(function() {
  const saved = localStorage.getItem('bcTheme');
  const sysPref = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', saved || sysPref);
})();

function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('bcTheme', next);
  const btn = document.getElementById('themeToggleBtn');
  btn.style.transform = 'scale(0.85) rotate(20deg)';
  setTimeout(() => btn.style.transform = '', 200);
}

// ── Mode switch ──
function switchMode(mode) {
  const fc = document.getElementById('fc-section');
  const qz = document.getElementById('qz-section');
  const glider = document.getElementById('modeGlider');
  const btnFC = document.getElementById('modeFCBtn');
  const btnQZ = document.getElementById('modeQZBtn');
  if (!fc || !qz) return;

  if (mode === 'flashcards') {
    fc.style.display = 'block';
    qz.style.display = 'none';
    fc.classList.add('active');
    qz.classList.remove('active');
    btnFC.classList.add('active');
    btnQZ.classList.remove('active');
    glider.classList.remove('right');
    window.scrollTo(0, 0);
  } else {
    qz.style.display = 'block';
    fc.style.display = 'none';
    qz.classList.add('active');
    fc.classList.remove('active');
    btnQZ.classList.add('active');
    btnFC.classList.remove('active');
    glider.classList.add('right');
    window.scrollTo(0, 0);
    document.documentElement.scrollTop = 0;
    document.body.scrollTop = 0;
    const mainEl = qz.querySelector('.main');
    if (mainEl) mainEl.scrollTop = 0;
  }
}

// ── Category filter toggle ──
function toggleCats() {
  const chips = document.getElementById('catBtns');
  const arrow = document.getElementById('catArrow');
  const lbl = document.getElementById('catToggleLbl');
  const isOpen = chips.classList.contains('expanded');
  chips.classList.toggle('expanded', !isOpen);
  arrow.classList.toggle('open', !isOpen);
  if (!isOpen) lbl.textContent = '🦷 Hide Filters';
  else lbl.textContent = '🦷 Filter by Category';
}

// ── Swipe gestures on flashcard ──
(function() {
  let startX = 0, startY = 0, isDragging = false;
  const THRESHOLD = 50;

  function onTouchStart(e) {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isDragging = true;
  }
  function onTouchEnd(e) {
    if (!isDragging) return; isDragging = false;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > THRESHOLD) {
      if (dx < 0) nextCard();
      else prevCard();
    }
  }
  document.addEventListener('DOMContentLoaded', function() {
    const box = document.getElementById('flipBox');
    if (box) {
      box.addEventListener('touchstart', onTouchStart, {passive:true});
      box.addEventListener('touchend', onTouchEnd, {passive:true});
    }
  });
})();

// ── System theme change listener ──
window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function(e) {
  if (!localStorage.getItem('bcTheme')) {
    document.documentElement.setAttribute('data-theme', e.matches ? 'light' : 'dark');
  }
});

// ── Scroll to top on quiz question change (patch) ──
const _origRenderQuestion = typeof renderQuestion === 'function' ? renderQuestion : null;
document.addEventListener('DOMContentLoaded', function() {
  const origNext = nextQuestion;
  // already bound via onclick
});
